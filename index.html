<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-M-i8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de PPS y Prácticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    
    <!-- React Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel Standalone for JSX and modern JS in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        font-family: 'Inter', sans-serif;
      }
      html, body {
        width: 100%;
        margin: 0;
        padding: 0;
      }
      #root {
        min-height: 100vh;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.1.0/",
    "react/": "https://esm.sh/react@^19.1.0/",
    "react": "https://esm.sh/react@^19.1.0"
  }
}
</script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
      // All application code is consolidated here.
      // No imports/exports are needed as everything is in the same scope.

      // ========= From types.ts =========
      const Orientacion = {
        CLINICA: "Clinica",
        LABORAL: "Laboral",
        EDUCACIONAL: "Educacional",
        COMUNITARIA: "Comunitaria",
        OTRA: "Otra"
      };

      const ALL_ORIENTACIONES = [
        Orientacion.CLINICA,
        Orientacion.LABORAL,
        Orientacion.EDUCACIONAL,
        Orientacion.COMUNITARIA
      ];

      // ========= From constants.ts =========
      const AIRTABLE_PAT = 'patEjnXqyKnMwEUw5.19a19b12ad3c23b36888b9e228c2c9db1cbc923e9a29d7357e4103bb286d4bd1';
      const AIRTABLE_BASE_ID = 'appBY8PYhPZ1X2ka1';
      const AIRTABLE_TABLE_NAME_PPS = 'Solicitud de PPS';
      const AIRTABLE_TABLE_NAME_PRACTICAS = 'Prácticas';
      const AIRTABLE_TABLE_NAME_ESTUDIANTES = 'Estudiantes';
      const AIRTABLE_TABLE_NAME_AUTH_USERS = 'Auth Users';
      const FIELD_LEGAJO_PPS = 'Legajo';
      const FIELD_ESTADO_PPS = 'Estado de seguimiento';
      const FIELD_EMPRESA_PPS_SOLICITUD = 'Nombre de la Institución';
      const FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS = 'Nombre Busqueda';
      const FIELD_NOTAS_PPS = 'Notas';
      const FIELD_ULTIMA_ACTUALIZACION_PPS = 'Actualización';
      const FIELD_NOMBRE_BUSQUEDA_PRACTICAS = 'Nombre busqueda';
      const FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS = 'Nombre (de Institución)';
      const FIELD_HORAS_PRACTICAS = 'Horas Realizadas';
      const FIELD_FECHA_INICIO_PRACTICAS = 'Fecha de Inicio';
      const FIELD_FECHA_FIN_PRACTICAS = 'Fecha de Finalización';
      const FIELD_ESTADO_PRACTICA = 'Estado';
      const FIELD_ESPECIALIDAD_PRACTICAS = 'Especialidad';
      const FIELD_LEGAJO_ESTUDIANTES = 'Legajo';
      const FIELD_NOMBRE_ESTUDIANTES = 'Nombre';
      const FIELD_LEGAJO_AUTH = 'Legajo';
      const FIELD_NOMBRE_AUTH = 'Nombre';
      const FIELD_PASSWORD_HASH_AUTH = 'PasswordHash';
      const FIELD_SALT_AUTH = 'Salt';
      const HORAS_OBJETIVO_TOTAL = 250;
      const HORAS_OBJETIVO_ORIENTACION = 70;
      const ROTACION_OBJETIVO_ORIENTACIONES = 3;
      const ALERT_DISCLAIMER_TITLE = "Importante";
      const ALERT_DISCLAIMER_TEXT_1 = "Esta información es una vista preliminar y puede no ser 100% precisa o estar actualizada. No tiene carácter de certificado oficial.";
      const ALERT_DISCLAIMER_TEXT_2 = "Para cualquier solicitud de corrección por omisión o error, es indispensable adjuntar la documentación respaldatoria correspondiente, principalmente la planilla de asistencia. No se realizarán cambios sin la documentación adecuada.";

      // ========= From utils/formatters.ts =========
      function formatDate(dateString) {
          if (!dateString) return 'N/A';
          try {
              const date = new Date(dateString);
              if (isNaN(date.getTime())) {
                  return 'Fecha inválida';
              }
              return date.toLocaleDateString('es-ES', {
                  year: 'numeric',
                  month: '2-digit',
                  day: '2-digit'
              });
          } catch (e) {
              return 'Fecha inválida';
          }
      }

      function getEspecialidadClasses(especialidad) {
          if (!especialidad) return 'bg-gray-100 text-gray-800 border-gray-300';
          const baseClasses = "inline-flex items-center font-medium py-0.5 px-2.5 rounded-full text-xs border";
          const normalizedEspecialidad = normalizeStringForComparison(especialidad);
          switch (normalizedEspecialidad) {
              case 'clinica': return `${baseClasses} bg-green-100 text-green-800 border-green-200`;
              case 'educacional': return `${baseClasses} bg-blue-100 text-blue-800 border-blue-200`;
              case 'laboral': return `${baseClasses} bg-red-100 text-red-800 border-red-200`;
              case 'comunitaria': return `${baseClasses} bg-purple-100 text-purple-800 border-purple-200`;
              default: return `${baseClasses} bg-gray-100 text-gray-800 border-gray-200`;
          }
      }

      function getStatusVisuals(status) {
          const normalizedStatus = normalizeStringForComparison(status);
          const baseLabel = "inline-flex items-center font-medium px-2.5 py-0.5 rounded-full text-xs capitalize";
          const baseIconContainer = "flex-shrink-0 size-10 rounded-lg flex items-center justify-center mr-4";
          if (normalizedStatus.includes('pps realiazada') || normalizedStatus.includes('convenio realizado')) return { icon: 'check_circle', iconContainerClass: `${baseIconContainer} bg-green-100 text-green-600`, labelClass: `${baseLabel} bg-green-100 text-green-800` };
          if (normalizedStatus.includes('no se pudo concretar')) return { icon: 'error', iconContainerClass: `${baseIconContainer} bg-red-100 text-red-600`, labelClass: `${baseLabel} bg-red-100 text-red-800` };
          if (normalizedStatus.includes('en conversaciones') || normalizedStatus.includes('realizando convenio')) return { icon: 'hourglass_top', iconContainerClass: `${baseIconContainer} bg-yellow-100 text-yellow-600`, labelClass: `${baseLabel} bg-yellow-100 text-yellow-800` };
          if (normalizedStatus.includes('puesta en contacto')) return { icon: 'rocket_launch', iconContainerClass: `${baseIconContainer} bg-blue-100 text-blue-600`, labelClass: `${baseLabel} bg-blue-100 text-blue-800` };
          if (normalizedStatus.includes('finalizada')) return { icon: 'check_circle', iconContainerClass: ``, labelClass: `${baseLabel} bg-green-100 text-green-800` };
          if (normalizedStatus.includes('en curso')) return { icon: 'hourglass_top', iconContainerClass: ``, labelClass: `${baseLabel} bg-yellow-100 text-yellow-800` };
          return { icon: 'help_outline', iconContainerClass: `${baseIconContainer} bg-slate-100 text-slate-500`, labelClass: `${baseLabel} bg-gray-100 text-gray-800` };
      }

      function normalizeStringForComparison(str) {
        if (!str) return "";
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
      }

      // ========= From utils/auth.ts =========
      function bufferToHex(buffer) {
        return [...new Uint8Array(buffer)].map(b => b.toString(16).padStart(2, '0')).join('');
      }
      function generateSalt() {
        const salt = window.crypto.getRandomValues(new Uint8Array(16));
        return bufferToHex(salt);
      }
      async function hashPassword(password, salt) {
        const encoder = new TextEncoder();
        const passwordWithSalt = encoder.encode(password + salt);
        const hashBuffer = await window.crypto.subtle.digest('SHA-256', passwordWithSalt);
        return bufferToHex(hashBuffer);
      }
      async function verifyPassword(password, salt, storedHash) {
        const newHash = await hashPassword(password, salt);
        return newHash === storedHash;
      }

      // ========= From services/airtableService.ts =========
      async function fetchDataGeneric(url) {
          try {
              const response = await fetch(url, { headers: { 'Authorization': `Bearer ${AIRTABLE_PAT}` } });
              if (!response.ok) {
                  let errorData;
                  try {
                      errorData = await response.json();
                  } catch (e) {
                      const textError = await response.text().catch(() => "Could not read error response body.");
                      errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
                  }
                  console.error('[fetchDataGeneric] Airtable API Error:', response.status, JSON.stringify(errorData), "URL:", url);
                  return { data: null, error: errorData };
              }
              const textResponse = await response.text();
              if (!textResponse) return { data: { records: [] }, error: null };
              const jsonData = JSON.parse(textResponse);
              return { data: { records: jsonData.records || [], offset: jsonData.offset }, error: null };
          } catch (networkError) {
              console.error('[fetchDataGeneric] Network or Fetch Error:', networkError, "URL:", url);
              return { data: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor.' } } };
          }
      }

      async function createAirtableRecord(tableName, fields) {
        const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}`;
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${AIRTABLE_PAT}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ records: [{ fields }] })
          });
          if (!response.ok) {
             let errorData;
             try {
                 errorData = await response.json();
             } catch (e) {
                 const textError = await response.text().catch(() => "Could not read error body.");
                 errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
             }
             console.error('[createAirtableRecord] Airtable API Error:', response.status, JSON.stringify(errorData));
             return { record: null, error: errorData };
          }
          const data = await response.json();
          return { record: data.records && data.records.length > 0 ? data.records[0] : null, error: null };
        } catch (networkError) {
          console.error('[createAirtableRecord] Network or Fetch Error:', networkError);
          return { record: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor.' } } };
        }
      }

      async function fetchAirtableData(tableName, fields = [], filterByFormula, maxRecords) {
          let url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}`;
          const params = new URLSearchParams();
          fields.forEach(field => params.append('fields[]', field));
          if (filterByFormula) params.set('filterByFormula', filterByFormula);
          if (maxRecords) params.set('maxRecords', maxRecords.toString());
          const queryString = params.toString();
          if (queryString) url += `?${queryString}`;
          const { data, error } = await fetchDataGeneric(url);
          if (error || !data) return { records: [], error: error || { error: { type: 'UNKNOWN_ERROR', message: 'An unknown error occurred.'}} };
          return { records: data.records, error: null };
      }

      // ========= Components =========
      const Loader = () => (
        <div className="flex justify-center items-center my-10 sm:my-12">
          <div className="border-4 border-slate-200 border-t-sky-500 rounded-full w-10 h-10 animate-spin"></div>
          <span className="sr-only">Cargando...</span>
        </div>
      );

      const Modal = ({ title, message, isOpen, onClose }) => {
        if (!isOpen) return null;
        return (
          <div className="fixed inset-0 z-[1000] flex items-center justify-center bg-black/60 p-4 backdrop-blur-sm">
            <div className="bg-white rounded-xl shadow-2xl p-6 sm:p-8 w-full max-w-md text-center">
              <h2 className="text-xl sm:text-2xl font-semibold text-sky-700 mb-4">{title}</h2>
              <p className="text-slate-600 text-sm sm:text-base mb-6 sm:mb-8 leading-relaxed whitespace-pre-wrap">{message}</p>
              <button onClick={onClose} className="bg-sky-600 hover:bg-sky-700 text-white font-medium py-2.5 px-6 rounded-lg text-sm sm:text-base transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-opacity-50" aria-label="Cerrar modal">Cerrar</button>
            </div>
          </div>
        );
      };
      
      const AppHeader = ({ isLoggedIn, onLogout }) => (
        <header className="mb-6 relative text-center">
          <h1 className="text-3xl sm:text-4xl font-bold text-slate-800">Portal de Prácticas Profesionales</h1>
          <p className="text-slate-500 text-base sm:text-lg mt-1">Consulta el estado de tus PPS y el progreso de tus horas.</p>
          {isLoggedIn && onLogout && (
              <button onClick={onLogout} className="absolute top-0 right-0 bg-slate-200 hover:bg-slate-300 text-slate-700 font-semibold py-2 px-4 rounded-lg transition-colors duration-200 text-sm shadow-sm" aria-label="Cerrar sesión">Cerrar Sesión</button>
          )}
        </header>
      );
      
      const Footer = () => (
        <footer className="mt-8">
          <div className="p-4 sm:p-5 bg-amber-50/80 border-l-4 border-amber-400 text-amber-800 text-sm rounded-r-lg shadow-sm flex items-start gap-4">
            <div className="flex-shrink-0 pt-0.5"><span className="material-icons text-amber-600" aria-hidden="true">info</span></div>
            <div>
              <p><strong className="font-semibold">{ALERT_DISCLAIMER_TITLE}:</strong> {ALERT_DISCLAIMER_TEXT_1}</p>
              <p className="mt-2">{ALERT_DISCLAIMER_TEXT_2}</p>
            </div>
          </div>
        </footer>
      );
      
      const ProgressBar = ({ value, max, label, unit = '' }) => {
        const percentage = max > 0 ? (value / max) * 100 : 0;
        return (
          <div className="flex flex-col gap-2">
            <div className="flex gap-4 justify-between items-center">
              <p className="text-slate-800 text-sm font-medium leading-normal">{label}</p>
              <p className="text-blue-600 text-sm font-semibold leading-normal">{Math.round(percentage)}%</p>
            </div>
            <div className="rounded-full h-2.5 bg-slate-200 overflow-hidden">
              <div className="h-2.5 rounded-full bg-blue-600 transition-all duration-500" style={{ width: `${percentage}%` }}></div>
            </div>
            <p className="text-slate-500 text-xs font-normal leading-normal">{value} / {max}{unit}</p>
          </div>
        );
      };

      const RotationTracker = ({ label, count, total, orientacionesUnicas }) => {
        const dots = Array.from({ length: total }, (_, i) => (<div key={i} className={`h-4 w-4 rounded-full transition-colors duration-300 ${i < count ? 'bg-blue-600' : 'bg-slate-200'}`} aria-label={`Rotación ${i + 1} ${i < count ? 'completada' : 'pendiente'}`}></div>));
        const completedText = count > 0 ? `(${orientacionesUnicas.join(', ')})` : '';
        return (
          <div className="flex flex-col gap-2">
            <div className="flex gap-4 justify-between items-center"><p className="text-slate-800 text-sm font-medium leading-normal">{label}</p></div>
            <div className="flex items-center gap-2.5 pt-1">{dots}</div>
            <p className="text-slate-500 text-xs font-normal leading-normal">{count} de {total} completadas <span className="font-medium text-slate-600 ml-1">{completedText}</span></p>
          </div>
        );
      };
      
      const PracticasTable = ({ practicas }) => {
        if (practicas.length === 0) return null;
        return (
          <div className="bg-white rounded-xl shadow-md p-6">
            <h2 className="text-slate-800 text-xl font-semibold leading-tight tracking-tight mb-4">Detalle de Prácticas</h2>
            <div className="border border-slate-200/80 rounded-lg overflow-x-auto">
              <table className="w-full min-w-[650px] ">
                <thead><tr className="bg-slate-50"><th className="text-left p-3 font-medium text-slate-600 text-sm">Institución</th><th className="text-left p-3 font-medium text-slate-600 text-sm">Especialidad</th><th className="text-center p-3 font-medium text-slate-600 text-sm">Horas</th><th className="text-left p-3 font-medium text-slate-600 text-sm">Inicio</th><th className="text-left p-3 font-medium text-slate-600 text-sm">Fin</th><th className="text-left p-3 font-medium text-slate-600 text-sm">Estado</th></tr></thead>
                <tbody>
                  {practicas.map((practica) => {
                    const institucionRaw = practica[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS];
                    const institucion = Array.isArray(institucionRaw) ? institucionRaw?.[0] : institucionRaw;
                    const especialidadRaw = practica[FIELD_ESPECIALIDAD_PRACTICAS];
                    const especialidad = Array.isArray(especialidadRaw) ? especialidadRaw?.[0] : especialidadRaw;
                    const estadoRaw = practica[FIELD_ESTADO_PRACTICA];
                    const estado = Array.isArray(estadoRaw) ? estadoRaw?.[0] : estadoRaw;
                    const visuals = getStatusVisuals(estado);
                    return (
                      <tr key={practica.id} className="border-t border-slate-200/70">
                        <td className="p-3 text-slate-700 text-sm font-medium">{institucion || 'N/A'}</td>
                        <td className="p-3 text-slate-700 text-sm"><span className={getEspecialidadClasses(especialidad)}>{especialidad || 'N/A'}</span></td>
                        <td className="text-center p-3 text-slate-700 text-sm">{practica[FIELD_HORAS_PRACTICAS] ?? 'N/A'}</td>
                        <td className="p-3 text-slate-700 text-sm">{formatDate(practica[FIELD_FECHA_INICIO_PRACTICAS])}</td>
                        <td className="p-3 text-slate-700 text-sm">{formatDate(practica[FIELD_FECHA_FIN_PRACTICAS])}</td>
                        <td className="p-3 text-slate-700 text-sm"><span className={visuals.labelClass}>{estado || 'N/A'}</span></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      const SolicitudCard = ({ solicitud }) => {
        const institucionRaw = solicitud[FIELD_EMPRESA_PPS_SOLICITUD];
        const institucion = Array.isArray(institucionRaw) ? institucionRaw?.[0] : institucionRaw;
        const statusRaw = solicitud[FIELD_ESTADO_PPS];
        const status = Array.isArray(statusRaw) ? statusRaw?.[0] : statusRaw;
        const notas = solicitud[FIELD_NOTAS_PPS];
        const actualizacion = solicitud[FIELD_ULTIMA_ACTUALIZACION_PPS];
        const visuals = getStatusVisuals(status);
        return (
          <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200/80 flex items-center">
            <div className={visuals.iconContainerClass}><span className="material-icons !text-2xl">{visuals.icon}</span></div>
            <div className="flex-grow">
              <div className="flex justify-between items-start gap-2 mb-1.5">
                <p className="text-slate-800 font-semibold leading-normal break-words pr-2">{institucion || 'Institución no especificada'}</p>
                <span className={visuals.labelClass}>{status || 'N/A'}</span>
              </div>
              {notas && <p className="text-slate-600 text-sm leading-snug whitespace-normal mb-2"><span className="font-semibold text-slate-700">Notas:</span> {notas}</p>}
              <p className="text-slate-500 text-xs font-normal">Última actualización: {formatDate(actualizacion)}</p>
            </div>
          </div>
        );
      };

      const SolicitudesList = ({ solicitudes }) => {
        if (solicitudes.length === 0) return null;
        return (
          <div className="bg-white rounded-xl shadow-md p-6">
            <h2 className="text-slate-800 text-xl font-semibold leading-tight tracking-tight mb-4">Mis Solicitudes de PPS</h2>
            <div className="space-y-4">{solicitudes.map((solicitud) => <SolicitudCard key={solicitud.id} solicitud={solicitud} />)}</div>
          </div>
        );
      };

      const CriteriosPanel = ({ criterios, selectedOrientacion, onOrientacionChange, studentName }) => {
        const StatusIcon = ({ completed }) => (<div className={`flex-shrink-0 size-6 rounded-full flex items-center justify-center transition-colors duration-300 ${completed ? 'bg-blue-600' : 'bg-slate-300'}`}>{completed ? <span className="material-icons text-white !text-base">check</span> : <div className="size-2 rounded-full bg-white/70"></div>}</div>);
        const todosLosCriteriosCumplidos = criterios.cumpleHorasTotales && criterios.cumpleRotacion && criterios.cumpleHorasOrientacion;
        return (
          <div className="bg-white border border-slate-200/80 rounded-xl p-6 mb-8 shadow-md">
            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-1"><h1 className="text-slate-800 tracking-tight text-2xl font-bold leading-tight">Bienvenido/a, {studentName}</h1></div>
            <p className="text-slate-500 text-sm font-normal leading-relaxed mb-6">Este es tu checklist para finalizar el recorrido de prácticas.</p>
            <div className="border-t border-slate-200 pt-6">
              <h2 className="text-lg font-semibold text-slate-700 mb-5">Criterios para Finalizar</h2>
              <div className="space-y-6">
                <div className="flex items-start gap-4"><StatusIcon completed={criterios.cumpleHorasTotales} /><div className="flex-grow"><ProgressBar label={`Completa ${HORAS_OBJETIVO_TOTAL} horas totales de práctica`} value={criterios.horasTotales} max={HORAS_OBJETIVO_TOTAL} unit=" hs"/></div></div>
                <div className="flex items-start gap-4"><StatusIcon completed={criterios.cumpleRotacion} /><div className="flex-grow"><RotationTracker label={`Rota por ${ROTACION_OBJETIVO_ORIENTACIONES} orientaciones como mínimo`} count={criterios.orientacionesCursadasCount} total={ROTACION_OBJETIVO_ORIENTACIONES} orientacionesUnicas={criterios.orientacionesUnicas}/></div></div>
                <div className="flex items-start gap-4">
                  <StatusIcon completed={criterios.cumpleHorasOrientacion} />
                  <div className="flex-grow">
                    <p className="text-slate-800 text-sm font-medium leading-normal mb-2">Completa {HORAS_OBJETIVO_ORIENTACION} horas en tu orientación principal</p>
                    <select id="orientacion-elegida-select" value={selectedOrientacion} onChange={(e) => onOrientacionChange(e.target.value)} className="w-full max-w-sm rounded-md border border-slate-300/80 p-2 text-sm text-slate-800 bg-white shadow-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 outline-none transition-colors" aria-label="Seleccionar orientación principal">
                      <option value="">Seleccione una orientación...</option>
                      {ALL_ORIENTACIONES.map(o => <option key={o} value={o}>{o}</option>)}
                    </select>
                    {selectedOrientacion ? (<div className="mt-4"><ProgressBar label={`Progreso en ${selectedOrientacion}`} value={criterios.horasOrientacionElegida} max={HORAS_OBJETIVO_ORIENTACION} unit=" hs"/></div>) : (<p className="mt-2 text-xs text-slate-500">Selecciona una orientación para ver tu progreso.</p>)}
                  </div>
                </div>
              </div>
              {todosLosCriteriosCumplidos && (
                <div className="mt-8 border-t border-slate-200 pt-6">
                  <div className="p-4 sm:p-5 bg-teal-50 border-l-4 border-teal-500 text-teal-900 rounded-r-lg shadow-sm flex items-start gap-4">
                    <div className="flex-shrink-0 pt-0.5"><span className="material-icons text-teal-600">celebration</span></div>
                    <div>
                      <h3 className="font-bold text-lg">¡Felicitaciones! Has cumplido todos los criterios.</h3>
                      <p className="mt-2 text-sm">Si aún no lo has hecho, debes solicitar la acreditación de tus horas mediante el siguiente formulario:</p>
                      <a href="https://airtable.com/appBY8PYhPZ1X2ka1/paglLBxubDedzl1qz/form" target="_blank" rel="noopener noreferrer" className="mt-4 inline-block bg-teal-600 text-white font-semibold text-sm py-2 px-4 rounded-md transition-all hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500">Solicitar Acreditación de Horas</a>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      };

      const AuthInput = ({ id, type, value, onChange, placeholder, icon, onBlur, disabled = false }) => (
          <div className="relative">
              <div className="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3"><span className="material-icons text-slate-400">{icon}</span></div>
              <input id={id} name={id} type={type} value={value} onChange={onChange} onBlur={onBlur} disabled={disabled} className="w-full rounded-md border border-slate-300 p-3 pl-10 text-base text-slate-800 bg-white shadow-sm placeholder-slate-400/80 focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 outline-none transition-all disabled:bg-slate-100" placeholder={placeholder} required />
          </div>
      );

      const Auth = ({ onLoginSuccess, showModal }) => {
          const [mode, setMode] = React.useState('login');
          const [legajo, setLegajo] = React.useState('');
          const [password, setPassword] = React.useState('');
          const [confirmPassword, setConfirmPassword] = React.useState('');
          const [isLoading, setIsLoading] = React.useState(false);
          const [error, setError] = React.useState(null);
          const [legajoCheckLoading, setLegajoCheckLoading] = React.useState(false);
          const [registerStudentName, setRegisterStudentName] = React.useState(null);
          const [legajoError, setLegajoError] = React.useState(null);

          const verifyLegajo = React.useCallback(async (legajoToVerify) => {
              if (!legajoToVerify || mode !== 'register') return;
              setLegajoCheckLoading(true);
              setRegisterStudentName(null);
              setLegajoError(null);
              let studentName = null;
              try {
                  const { records: studentRecords, error: studentError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_ESTUDIANTES, [FIELD_NOMBRE_ESTUDIANTES], `{${FIELD_LEGAJO_ESTUDIANTES}} = '${legajoToVerify}'`, 1);
                  if (studentRecords.length > 0 && studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES]) {
                      studentName = studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES];
                  } else {
                      const { records: ppsRecords } = await fetchAirtableData(AIRTABLE_TABLE_NAME_PPS, [FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS], `{${FIELD_LEGAJO_PPS}} = '${legajoToVerify}'`, 1);
                      if (ppsRecords.length > 0) {
                          const nameField = ppsRecords[0].fields[FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS];
                          if (Array.isArray(nameField) && nameField.length > 0) studentName = nameField[0];
                          else if (typeof nameField === 'string') studentName = nameField;
                      }
                  }
                  if (studentName) setRegisterStudentName(studentName);
                  else { setLegajoError('No se encontró un estudiante con este legajo.'); setLegajoCheckLoading(false); return; }
              } catch (e) { setLegajoError('Ocurrió un error al buscar tu nombre.'); setLegajoCheckLoading(false); return; }

              try {
                  const { records: existingUser, error: existingUserError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_AUTH_USERS, [FIELD_LEGAJO_AUTH], `{${FIELD_LEGAJO_AUTH}} = '${legajoToVerify}'`, 1);
                  if (existingUserError) console.warn("Advertencia: No se pudo verificar si el usuario ya existe.", existingUserError);
                  else if (existingUser.length > 0) setLegajoError('Ya existe una cuenta para este legajo. Por favor, inicia sesión.');
              } catch (e) { console.warn("Advertencia: Error al verificar si el usuario ya existe.", e); } 
              finally { setLegajoCheckLoading(false); }
          }, [mode]);

          React.useEffect(() => {
              if (mode !== 'register') return;
              const handler = setTimeout(() => {
                  const legajoTrimmed = legajo.trim();
                  if (legajoTrimmed.match(/^\d+$/)) verifyLegajo(legajoTrimmed);
                  else { setLegajoError(legajoTrimmed ? 'El legajo debe ser solo números.' : null); setRegisterStudentName(null); }
              }, 500);
              return () => clearTimeout(handler);
          }, [legajo, mode, verifyLegajo]);

          const handleSubmit = async (e) => {
              e.preventDefault();
              const legajoTrimmed = legajo.trim();
              if (!legajoTrimmed || !password.trim() || !legajoTrimmed.match(/^\d+$/)) { setError('Por favor, completa todos los campos correctamente.'); return; }
              setIsLoading(true);
              setError(null);
              if (mode === 'register' && legajoError) { setError(legajoError); setIsLoading(false); return; }

              try {
                  if (mode === 'login') {
                      const { records, error: fetchError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_AUTH_USERS, [FIELD_PASSWORD_HASH_AUTH, FIELD_SALT_AUTH, FIELD_NOMBRE_AUTH], `{${FIELD_LEGAJO_AUTH}} = '${legajoTrimmed}'`, 1);
                      if (fetchError) throw new Error('Error al conectar con el servidor.');
                      if (records.length === 0) { setError('Legajo o contraseña incorrectos.'); setIsLoading(false); return; }
                      const user = records[0].fields;
                      const isValid = await verifyPassword(password, user[FIELD_SALT_AUTH], user[FIELD_PASSWORD_HASH_AUTH]);
                      if (isValid) onLoginSuccess({ legajo: legajoTrimmed, nombre: user[FIELD_NOMBRE_AUTH] });
                      else setError('Legajo o contraseña incorrectos.');
                  } else {
                      if (password !== confirmPassword) { setError('Las contraseñas no coinciden.'); setIsLoading(false); return; }
                      if (!registerStudentName) { setError('Verifica tu legajo antes de registrarte.'); setIsLoading(false); return; }
                      const salt = generateSalt();
                      const passwordHash = await hashPassword(password, salt);
                      const { record, error: createError } = await createAirtableRecord(AIRTABLE_TABLE_NAME_AUTH_USERS, { [FIELD_LEGAJO_AUTH]: legajoTrimmed, [FIELD_NOMBRE_AUTH]: registerStudentName, [FIELD_PASSWORD_HASH_AUTH]: passwordHash, [FIELD_SALT_AUTH]: salt });
                      if (createError || !record) { console.error("Airtable Create Error:", createError); throw new Error(typeof createError?.error === 'string' ? createError.error : createError?.error.message || 'No se pudo crear la cuenta.'); }
                      onLoginSuccess({ legajo: legajoTrimmed, nombre: registerStudentName });
                      showModal('¡Éxito!', 'Tu cuenta ha sido creada y has iniciado sesión automáticamente.');
                  }
              } catch (err) { setError(err.message || 'Ocurrió un error inesperado.'); } finally { setIsLoading(false); }
          };

          const handleModeChange = (newMode) => { setMode(newMode); setError(null); setLegajoError(null); setRegisterStudentName(null); setPassword(''); setConfirmPassword(''); };

          return (
            <div className="bg-white rounded-xl shadow-md p-6 sm:p-8">
              <div className="flex border-b border-slate-200 mb-6">
                <button onClick={() => handleModeChange('login')} className={`flex-1 py-3 text-sm sm:text-base font-semibold transition-colors duration-200 ${mode === 'login' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>Iniciar Sesión</button>
                <button onClick={() => handleModeChange('register')} className={`flex-1 py-3 text-sm sm:text-base font-semibold transition-colors duration-200 ${mode === 'register' ? 'border-b-2 border-blue-600 text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}>Crear Usuario</button>
              </div>
              <form onSubmit={handleSubmit} className="space-y-4">
                <AuthInput id="legajo" type="text" value={legajo} onChange={(e) => setLegajo(e.target.value)} placeholder="Número de Legajo" icon="badge" disabled={isLoading} />
                {mode === 'register' && (<div className="h-10 px-3 flex items-center">{legajoCheckLoading ? (<div className="flex items-center gap-2 text-slate-500 text-sm"><div className="border-2 border-slate-200 border-t-sky-500 rounded-full w-4 h-4 animate-spin"></div><span>Verificando legajo...</span></div>) : legajoError ? (<p className="text-red-600 text-sm flex items-center gap-1.5"><span className="material-icons !text-base">error_outline</span>{legajoError}</p>) : registerStudentName ? (<p className="text-green-700 text-sm font-medium flex items-center gap-1.5"><span className="material-icons !text-base">check_circle</span>Estudiante: {registerStudentName}</p>) : <p className="text-slate-500 text-xs">Ingresa tu legajo para verificar tu identidad.</p>}</div>)}
                <AuthInput id="password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Contraseña" icon="lock" disabled={isLoading}/>
                {mode === 'register' && (<AuthInput id="confirmPassword" type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} placeholder="Confirmar Contraseña" icon="lock_person" disabled={isLoading} />)}
                {error && <p className="text-red-600 text-sm text-center">{error}</p>}
                <button type="submit" disabled={isLoading || (mode === 'register' && (!registerStudentName || !!legajoError))} className="w-full bg-blue-600 text-white font-semibold text-base py-3 px-6 rounded-md transition-all duration-200 ease-in-out shadow-sm hover:bg-blue-700 active:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-slate-400 disabled:cursor-not-allowed flex items-center justify-center gap-2">{isLoading && <div className="border-2 border-white/50 border-t-white rounded-full w-5 h-5 animate-spin"></div>}{mode === 'login' ? 'Ingresar' : 'Crear Cuenta'}</button>
              </form>
            </div>
          );
      };

      // ========= Main App Component =========
      const App = () => {
          const [authenticatedUser, setAuthenticatedUser] = React.useState(null);
          const [practicas, setPracticas] = React.useState([]);
          const [solicitudes, setSolicitudes] = React.useState([]);
          const [isLoading, setIsLoading] = React.useState(true);
          const [modalInfo, setModalInfo] = React.useState(null);
          const [selectedOrientacion, setSelectedOrientacion] = React.useState("");
          const [criterios, setCriterios] = React.useState({
              horasTotales: 0, horasFaltantes250: HORAS_OBJETIVO_TOTAL, cumpleHorasTotales: false,
              horasOrientacionElegida: 0, horasFaltantesOrientacion: HORAS_OBJETIVO_ORIENTACION, cumpleHorasOrientacion: false,
              orientacionesCursadasCount: 0, orientacionesUnicas: [], cumpleRotacion: false,
          });

          React.useEffect(() => {
              if (!window.AIRTABLE_PAT_WARNING_SHOWN) {
                  console.warn("ADVERTENCIA DE SEGURIDAD: El token PAT de Airtable está expuesto. Proteger en un backend en producción.");
                  window.AIRTABLE_PAT_WARNING_SHOWN = true;
              }
              const storedUser = sessionStorage.getItem('authenticatedUser');
              if (storedUser) setAuthenticatedUser(JSON.parse(storedUser));
              else setIsLoading(false);
          }, []);

          const handleShowModal = (title, message) => setModalInfo({ title, message });

          const calculateCriterios = React.useCallback(() => {
              let totalHoras = 0;
              const matchedNormalizedOrientacionesEnumSet = new Set();
              practicas.forEach(p => {
                  totalHoras += p[FIELD_HORAS_PRACTICAS] || 0;
                  const especialidadPractica = p[FIELD_ESPECIALIDAD_PRACTICAS];
                  if (especialidadPractica) {
                      const normalizedEspecialidad = normalizeStringForComparison(especialidadPractica);
                      if (ALL_ORIENTACIONES.some(o => normalizeStringForComparison(o) === normalizedEspecialidad)) {
                          matchedNormalizedOrientacionesEnumSet.add(normalizedEspecialidad);
                      }
                  }
              });
              let horasEnOrientacion = 0;
              if (selectedOrientacion) {
                  const normalizedSelected = normalizeStringForComparison(selectedOrientacion);
                  practicas.forEach(p => {
                      if (p[FIELD_ESPECIALIDAD_PRACTICAS] && normalizeStringForComparison(p[FIELD_ESPECIALIDAD_PRACTICAS]) === normalizedSelected) {
                          horasEnOrientacion += p[FIELD_HORAS_PRACTICAS] || 0;
                      }
                  });
              }
              const newCriterios = {
                  horasTotales: totalHoras, cumpleHorasTotales: totalHoras >= HORAS_OBJETIVO_TOTAL,
                  horasOrientacionElegida: horasEnOrientacion, cumpleHorasOrientacion: selectedOrientacion ? horasEnOrientacion >= HORAS_OBJETIVO_ORIENTACION : false,
                  orientacionesCursadasCount: matchedNormalizedOrientacionesEnumSet.size,
                  orientacionesUnicas: Array.from(matchedNormalizedOrientacionesEnumSet).map(n => ALL_ORIENTACIONES.find(o => normalizeStringForComparison(o) === n) || n),
                  cumpleRotacion: matchedNormalizedOrientacionesEnumSet.size >= ROTACION_OBJETIVO_ORIENTACIONES,
              };
              setCriterios(newCriterios);
          }, [practicas, selectedOrientacion]);

          React.useEffect(() => { calculateCriterios(); }, [practicas, selectedOrientacion, calculateCriterios]);

          const resetStateForNewLogin = () => {
              setPracticas([]);
              setSolicitudes([]);
              setSelectedOrientacion("");
          };

          const fetchDataForUser = React.useCallback(async (legajo, studentName) => {
              setIsLoading(true);
              resetStateForNewLogin();
              let foundAnyData = false;
              try {
                  const { records: practicasRecords, error: practicasError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_PRACTICAS, [FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS, FIELD_HORAS_PRACTICAS, FIELD_FECHA_INICIO_PRACTICAS, FIELD_FECHA_FIN_PRACTICAS, FIELD_ESTADO_PRACTICA, FIELD_ESPECIALIDAD_PRACTICAS], `{${FIELD_NOMBRE_BUSQUEDA_PRACTICAS}} = '${studentName}'`);
                  if (practicasError) handleShowModal('Error', `Error al cargar prácticas: ${practicasError.error.message}`);
                  else if (practicasRecords.length > 0) { setPracticas(practicasRecords.map(r => ({ ...r.fields, id: r.id }))); foundAnyData = true; }
                  
                  const { records: solicitudesRecords, error: solicitudesError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_PPS, [FIELD_EMPRESA_PPS_SOLICITUD, FIELD_ESTADO_PPS, FIELD_NOTAS_PPS, FIELD_ULTIMA_ACTUALIZACION_PPS], `{${FIELD_LEGAJO_PPS}} = '${legajo.trim()}'`);
                  if (solicitudesError) handleShowModal('Error', `Error al cargar solicitudes: ${solicitudesError.error.message}`);
                  else if (solicitudesRecords.length > 0) { setSolicitudes(solicitudesRecords.map(r => ({ ...r.fields, id: r.id }))); foundAnyData = true; }
                  
                  if (!foundAnyData) handleShowModal('Sin Resultados', `No se encontró información para ${studentName}.`);
              } catch (error) { handleShowModal('Error Crítico', `Ocurrió un error inesperado: ${error.message}`); } 
              finally { setIsLoading(false); }
          }, []);

          React.useEffect(() => {
              if (authenticatedUser) fetchDataForUser(authenticatedUser.legajo, authenticatedUser.nombre);
          }, [authenticatedUser, fetchDataForUser]);

          const handleLoginSuccess = (user) => { setAuthenticatedUser(user); sessionStorage.setItem('authenticatedUser', JSON.stringify(user)); };
          const handleLogout = () => { setAuthenticatedUser(null); sessionStorage.removeItem('authenticatedUser'); resetStateForNewLogin(); };

          const showData = !isLoading && authenticatedUser;

          return (
              <div className="w-full max-w-4xl mx-auto p-4 sm:p-6 md:p-8 flex flex-col min-h-screen">
                  <div className="flex-grow">
                      <AppHeader isLoggedIn={!!authenticatedUser} onLogout={handleLogout} />
                      {isLoading && <Loader />}
                      {!isLoading && !authenticatedUser && <Auth onLoginSuccess={handleLoginSuccess} showModal={handleShowModal} />}
                      {showData && (
                          <div className="space-y-8">
                              <CriteriosPanel criterios={criterios} selectedOrientacion={selectedOrientacion} onOrientacionChange={setSelectedOrientacion} studentName={authenticatedUser.nombre} />
                              <SolicitudesList solicitudes={solicitudes} />
                              <PracticasTable practicas={practicas} />
                              <Footer />
                          </div>
                      )}
                  </div>
                  <Modal isOpen={!!modalInfo} title={modalInfo?.title || ''} message={modalInfo?.message || ''} onClose={() => setModalInfo(null)} />
              </div>
          );
      };

      // ========= Initial Render =========
      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    </script>
</body>
</html>
