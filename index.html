<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de PPS y Prácticas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Icons" rel="stylesheet">
    <style>
      :root {
        --color-primary: 37 99 235; /* blue-600 */
        --color-slate-50: 248 250 252;
        --color-slate-100: 241 245 249;
        --color-slate-800: 30 41 59;
        --color-slate-900: 15 23 42;

        /* Corrected Gradient Colors with hardcoded hex values */
        --gradient-progress-from: #60a5fa; /* sky-400 */
        --gradient-progress-to: #3b82f6;   /* blue-500 */
        --gradient-complete-from: #34d399; /* emerald-400 */
        --gradient-complete-to: #14b8a6;   /* teal-500 */
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: rgb(var(--color-slate-50));
        color: rgb(var(--color-slate-900)); /* Darker base text color for better contrast */
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        /* Softer, more subtle gradient background */
        background-image: radial-gradient(circle at 10% 10%, rgb(241 245 249 / 0.8) 0%, transparent 40%),
                          radial-gradient(circle at 90% 90%, #ffffff 0%, transparent 40%);
      }
      #root {
        min-height: 100vh;
        width: 100%;
      }

      /* -- Custom Animations -- */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.6s cubic-bezier(0.39, 0.58, 0.57, 1) forwards;
        opacity: 0;
        will-change: transform, opacity;
      }
      
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
       .animate-scale-in {
        animation: scaleIn 0.4s cubic-bezier(0.39, 0.58, 0.57, 1) forwards;
        will-change: transform, opacity;
      }
      
      @keyframes backgroundShine {
        from { background-position: 200% 0; }
        to { background-position: -200% 0; }
      }
      .animate-background-shine {
        animation: backgroundShine 1.5s linear infinite;
        background: linear-gradient(110deg, #e2e8f0 8%, #f1f5f9 18%, #e2e8f0 33%);
        background-size: 200% 100%;
        will-change: background-position;
      }
      
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 15px -3px rgba(59, 130, 246, 0.4); } /* blue-500 */
        50% { box-shadow: 0 0 25px 5px rgba(59, 130, 246, 0.4); }
      }
      .animate-pulse-glow {
        animation: pulse-glow 2.5s infinite ease-in-out;
      }

      @keyframes subtle-shine {
        0% { transform: translateX(-100%) skewX(-20deg); }
        100% { transform: translateX(200%) skewX(-20deg); }
      }

      .has-subtle-shine::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 50%;
        height: 100%;
        background: linear-gradient(to right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 50%, rgba(255, 255, 255, 0) 100%);
        transform: translateX(-100%) skewX(-20deg);
        transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        pointer-events: none;
        z-index: 1;
      }
      .hover\:subtle-shine:hover::after {
        animation: subtle-shine 1s ease-in-out;
      }
      
      @keyframes slow-pan {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      @keyframes subtle-bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }

      /* -- Prose styles for AI-generated content (good practice) -- */
      .prose {
          color: #334155;
          line-height: 1.7;
          max-width: none;
      }
      .prose p {
          margin-bottom: 1em;
      }
      .prose h1, .prose h2, .prose h3 {
          color: #0f172a;
          line-height: 1.3;
          font-weight: 700;
          margin-bottom: 0.8em;
          margin-top: 1.5em;
          letter-spacing: -0.025em; /* Tighter headings */
      }
      .prose h2 {
          font-size: 1.5em;
          padding-bottom: 0.4em;
          border-bottom: 1px solid #e2e8f0;
      }
      .prose h3 {
          font-size: 1.25em;
      }
      .prose strong {
          font-weight: 600;
          color: #1e293b;
      }
      .prose ul {
          list-style-type: disc;
          padding-left: 1.5em;
          margin-top: 1em;
          margin-bottom: 1em;
      }
      .prose li {
          margin-bottom: 0.5em;
      }
      .prose hr {
          margin-top: 2em;
          margin-bottom: 2em;
          border-top: 1px solid #e2e8f0;
      }
    </style>

}
