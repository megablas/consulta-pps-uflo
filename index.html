// From: utils/formatters.ts
// ---
function formatDate(dateString) {
    if (!dateString) return 'N/A';
    try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) {
            return 'Fecha inválida';
        }
        return date.toLocaleDateString('es-ES', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });
    } catch (e) {
        return 'Fecha inválida';
    }
}
function getEspecialidadClasses(especialidad) {
    if (!especialidad) return 'bg-slate-100 text-slate-800 border-slate-200';
    
    const baseClasses = "inline-flex items-center font-medium py-1 px-2.5 rounded-full text-xs border";
    const normalizedEspecialidad = normalizeStringForComparison(especialidad);

    switch (normalizedEspecialidad) {
        case 'clinica':
            return `${baseClasses} bg-teal-100 text-teal-800 border-teal-200`;
        case 'educacional':
            return `${baseClasses} bg-sky-100 text-sky-800 border-sky-200`;
        case 'laboral':
            return `${baseClasses} bg-rose-100 text-rose-800 border-rose-200`;
        case 'comunitaria':
            return `${baseClasses} bg-violet-100 text-violet-800 border-violet-200`;
        default:
            return `${baseClasses} bg-slate-100 text-slate-800 border-slate-200`;
    }
}
function getStatusVisuals(status) {
    const normalizedStatus = normalizeStringForComparison(status);
    const baseLabel = "inline-flex items-center font-semibold px-2.5 py-1 rounded-full text-xs capitalize";
    const baseIconContainer = "flex-shrink-0 size-11 rounded-lg flex items-center justify-center mr-4";

    if (normalizedStatus.includes('pps realiazada') || normalizedStatus.includes('convenio realizado') || normalizedStatus.includes('finalizada')) {
        return {
            icon: 'check_circle',
            iconContainerClass: `${baseIconContainer} bg-teal-100 text-teal-600`,
            labelClass: `${baseLabel} bg-teal-100 text-teal-800`,
        };
    }
    if (normalizedStatus.includes('no se pudo concretar')) {
        return {
            icon: 'error',
            iconContainerClass: `${baseIconContainer} bg-rose-100 text-rose-600`,
            labelClass: `${baseLabel} bg-rose-100 text-rose-800`,
        };
    }
    if (normalizedStatus.includes('en conversaciones') || normalizedStatus.includes('realizando convenio') || normalizedStatus.includes('en curso')) {
        return {
            icon: 'hourglass_top',
            iconContainerClass: `${baseIconContainer} bg-yellow-100 text-yellow-600`,
            labelClass: `${baseLabel} bg-yellow-100 text-yellow-800`,
        };
    }
    if (normalizedStatus.includes('puesta en contacto')) {
        return {
            icon: 'rocket_launch',
            iconContainerClass: `${baseIconContainer} bg-sky-100 text-sky-600`,
            labelClass: `${baseLabel} bg-sky-100 text-sky-800`,
        };
    }
    return {
        icon: 'help_outline',
        iconContainerClass: `${baseIconContainer} bg-slate-100 text-slate-500`,
        labelClass: `${baseLabel} bg-slate-100 text-slate-800`,
    };
}
function normalizeStringForComparison(str) {
  if (!str) return "";
  return str
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function bufferToHex(buffer) {
  return [...new Uint8Array(buffer)]
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}
function generateSalt() {
  const salt = window.crypto.getRandomValues(new Uint8Array(16));
  return bufferToHex(salt);
}
async function hashPassword(password, salt) {
  const encoder = new TextEncoder();
  const passwordWithSalt = encoder.encode(password + salt);
  const hashBuffer = await window.crypto.subtle.digest('SHA-256', passwordWithSalt);
  return bufferToHex(hashBuffer);
}
async function verifyPassword(password, salt, storedHash) {
  const newHash = await hashPassword(password, salt);
  return newHash === storedHash;
}


// From: services/airtableService.ts
// ---
async function fetchDataGeneric(url) {
    try {
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${AIRTABLE_PAT}` }
        });

        if (!response.ok) {
            let errorData;
            try {
                const jsonError = await response.json();
                errorData = jsonError; 
                if (typeof errorData.error !== 'object' && typeof errorData.error !== 'string') {
                     errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${response.statusText}. Response not a valid error JSON.` }};
                }
            } catch (e) {
                const textError = await response.text().catch(() => "Could not read error response body.");
                errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
            }
            console.error('[fetchDataGeneric] Airtable API Error:', response.status, JSON.stringify(errorData), "URL:", url);
            return { data: null, error: errorData };
        }
        
        const textResponse = await response.text();
        if (!textResponse) {
            return { data: { records: [] }, error: null };
        }

        try {
            const jsonData = JSON.parse(textResponse);
            return { data: { records: jsonData.records || [], offset: jsonData.offset }, error: null };
        } catch (jsonParseError) {
            console.error('[fetchDataGeneric] JSON Parse Error:', jsonParseError, "Response Text:", textResponse);
            return { data: null, error: { error: { type: 'JSON_PARSE_ERROR', message: 'La respuesta del servidor no pudo ser procesada (JSON inválido).' } } };
        }

    } catch (networkError) {
        console.error('[fetchDataGeneric] Network or Fetch Error:', networkError, "URL:", url);
        return { data: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor. Revisa tu conexión a internet.' } } };
    }
}
async function createAirtableRecord(tableName, fields) {
  const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}`;
  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_PAT}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        records: [{ fields }]
      })
    });

    if (!response.ok) {
       let errorData;
       try {
           const jsonError = await response.json();
           errorData = jsonError;
       } catch (e) {
           const textError = await response.text().catch(() => "Could not read error response body.");
           errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
       }
       console.error('[createAirtableRecord] Airtable API Error:', response.status, JSON.stringify(errorData));
       return { record: null, error: errorData };
    }

    const data = await response.json();
    if (data.records && data.records.length > 0) {
      return { record: data.records[0], error: null };
    } else {
      return { record: null, error: { error: { type: 'CREATE_FAILED', message: 'La creación del registro no devolvió el registro esperado.' } } };
    }

  } catch (networkError) {
    console.error('[createAirtableRecord] Network or Fetch Error:', networkError);
    return { record: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor. Revisa tu conexión a internet.' } } };
  }
}
async function updateAirtableRecord(tableName, recordId, fields) {
  const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}/${recordId}`;
  try {
    const response = await fetch(url, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_PAT}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ fields })
    });

    if (!response.ok) {
       let errorData;
       try {
           const jsonError = await response.json();
           errorData = jsonError;
       } catch (e) {
           const textError = await response.text().catch(() => "Could not read error response body.");
           errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
       }
       console.error('[updateAirtableRecord] Airtable API Error:', response.status, JSON.stringify(errorData));
       return { record: null, error: errorData };
    }

    const record = await response.json();
    return { record, error: null };

  } catch (networkError) {
    console.error('[updateAirtableRecord] Network or Fetch Error:', networkError);
    return { record: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor. Revisa tu conexión a internet.' } } };
  }
}
async function fetchAirtableData(tableName, fields = [], filterByFormula, maxRecords) {
    let url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}`;
    const params = new URLSearchParams();

    fields.forEach(field => params.append('fields[]', field));
    if (filterByFormula) {
        params.set('filterByFormula', filterByFormula);
    }
    if (maxRecords) {
        params.set('maxRecords', maxRecords.toString());
    }
    
    const queryString = params.toString();
    if (queryString) {
        url += `?${queryString}`;
    }

    const { data, error } = await fetchDataGeneric(url);
    if (error || !data) {
        return { records: [], error: error || { error: { type: 'UNKNOWN_ERROR', message: 'An unknown error occurred.'}} };
    }
    return { records: data.records, error: null };
}

const Auth = ({ onLoginSuccess, showModal }) => {
  const { useState, useCallback, useEffect } = React;
  
  const [mode, setMode] = useState('login');
  const [legajo, setLegajo] = useState('');
  const [password, setPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');

  const [isLoading, setIsLoading] = useState(false);
  const [error, setError] = useState(null);

  const [legajoCheckLoading, setLegajoCheckLoading] = useState(false);
  const [registerStudentName, setRegisterStudentName] = useState(null);
  const [legajoError, setLegajoError] = useState(null);

  const verifyLegajo = useCallback(async (legajoToVerify) => {
    if (!legajoToVerify || mode !== 'register') return;

    setLegajoCheckLoading(true);
    setRegisterStudentName(null);
    setLegajoError(null);

    let studentName = null;
    
    try {
        const { records: studentRecords, error: studentError } = await fetchAirtableData(
            AIRTABLE_TABLE_NAME_ESTUDIANTES,
            [FIELD_NOMBRE_ESTUDIANTES],
            `{${FIELD_LEGAJO_ESTUDIANTES}} = '${legajoToVerify}'`,
            1
        );
        if (studentError) console.warn("Could not query 'Estudiantes' table:", studentError.error);

        if (studentRecords.length > 0 && studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES]) {
            studentName = studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES];
        } else {
            const { records: ppsRecords, error: ppsError } = await fetchAirtableData(
                AIRTABLE_TABLE_NAME_PPS,
                [FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS],
                `{${FIELD_LEGAJO_PPS}} = '${legajoToVerify}'`,
                1
            );
            if (ppsError) console.warn("Could not query 'PPS' table:", ppsError.error);

            if (ppsRecords.length > 0) {
                const nameField = ppsRecords[0].fields[FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS];
                if (Array.isArray(nameField) && nameField.length > 0) studentName = nameField[0];
                else if (typeof nameField === 'string') studentName = nameField;
            }
        }

        if (studentName) {
            setRegisterStudentName(studentName);
        } else {
            setLegajoError('No se encontró un estudiante con este legajo. Verifica el número.');
            setLegajoCheckLoading(false);
            return;
        }
    } catch (e) {
        setLegajoError('Ocurrió un error al buscar tu nombre. Inténtalo de nuevo.');
        setLegajoCheckLoading(false);
        return;
    }

    try {
        const { records: existingUser, error: existingUserError } = await fetchAirtableData(
            AIRTABLE_TABLE_NAME_AUTH_USERS,
            [FIELD_LEGAJO_AUTH],
            `{${FIELD_LEGAJO_AUTH}} = '${legajoToVerify}'`,
            1
        );

        if (existingUserError) {
            console.warn( "Advertencia: No se pudo verificar si el usuario ya existe.", existingUserError);
        } else if (existingUser.length > 0) {
            setLegajoError('Ya existe una cuenta para este legajo. Por favor, inicia sesión.');
        }
    } catch (e) {
        console.warn("Advertencia: Ocurrió un error crítico al verificar si el usuario ya existe.", e);
    } finally {
        setLegajoCheckLoading(false);
    }
  }, [mode]);

  useEffect(() => {
    if (mode !== 'register') return;

    const handler = setTimeout(() => {
      const legajoTrimmed = legajo.trim();
      if (legajoTrimmed.match(/^\d+$/)) {
        verifyLegajo(legajoTrimmed);
      } else {
        setLegajoError(legajoTrimmed ? 'El legajo debe ser solo números.' : null);
        setRegisterStudentName(null);
      }
    }, 500);

    return () => {
      clearTimeout(handler);
    };
  }, [legajo, mode, verifyLegajo]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    const legajoTrimmed = legajo.trim();
    const passwordTrimmed = password.trim();

    if (legajoTrimmed === 'admin' && passwordTrimmed === 'superadmin') {
      onLoginSuccess({ legajo: 'admin', nombre: 'Super Usuario', isSuperUser: true });
      return;
    }

    if (!legajoTrimmed || !passwordTrimmed || !legajoTrimmed.match(/^\d+$/)) {
        setError('Por favor, completa todos los campos correctamente. El legajo debe ser numérico.');
        return;
    }

    setIsLoading(true);
    setError(null);
    
    if (mode === 'register' && legajoError) {
        setError(legajoError);
        setIsLoading(false);
        return;
    }

    try {
        if (mode === 'login') {
            const { records, error: fetchError } = await fetchAirtableData(
                AIRTABLE_TABLE_NAME_AUTH_USERS,
                [FIELD_PASSWORD_HASH_AUTH, FIELD_SALT_AUTH, FIELD_NOMBRE_AUTH],
                `{${FIELD_LEGAJO_AUTH}} = '${legajoTrimmed}'`,
                1
            );
            if (fetchError) throw new Error('Error al conectar con el servidor.');
            if (records.length === 0) {
                setError('Legajo o contraseña incorrectos.');
                setIsLoading(false);
                return;
            }
            const user = records[0].fields;
            const isValid = await verifyPassword(passwordTrimmed, user[FIELD_SALT_AUTH], user[FIELD_PASSWORD_HASH_AUTH]);

            if (isValid) {
                onLoginSuccess({ legajo: legajoTrimmed, nombre: user[FIELD_NOMBRE_AUTH] });
            } else {
                setError('Legajo o contraseña incorrectos.');
            }

        } else {
            if (passwordTrimmed !== confirmPassword.trim()) {
                setError('Las contraseñas no coinciden.');
                setIsLoading(false);
                return;
            }
            if (!registerStudentName) {
                setError('Verifica tu legajo antes de registrarte.');
                setIsLoading(false);
                return;
            }
            
            const salt = generateSalt();
            const passwordHash = await hashPassword(passwordTrimmed, salt);
            
            const { record, error: createError } = await createAirtableRecord(AIRTABLE_TABLE_NAME_AUTH_USERS, {
                [FIELD_LEGAJO_AUTH]: legajoTrimmed,
                [FIELD_NOMBRE_AUTH]: registerStudentName,
                [FIELD_PASSWORD_HASH_AUTH]: passwordHash,
                [FIELD_SALT_AUTH]: salt
            });

            if (createError || !record) {
                console.error("Airtable Create Error:", createError)
                throw new Error(typeof createError?.error === 'string' ? createError.error : createError?.error.message || 'No se pudo crear la cuenta.');
            }
            
            onLoginSuccess({ legajo: legajoTrimmed, nombre: registerStudentName });
            showModal('¡Éxito!', 'Tu cuenta ha sido creada y has iniciado sesión automáticamente.');
        }
    } catch (err) {
        setError(err.message || 'Ocurrió un error inesperado.');
    } finally {
        setIsLoading(false);
    }
  };

  const handleModeChange = (newMode) => {
    setMode(newMode);
    setError(null);
    setLegajoError(null);
    setRegisterStudentName(null);
    setPassword('');
    setConfirmPassword('');
  }

  return (
    <div className="bg-white rounded-xl shadow-md p-6 sm:p-8">
        <div className="flex border-b border-slate-200 mb-6">
            <button onClick={() => handleModeChange('login')} className={`flex-1 py-3 text-sm sm:text-base font-semibold transition-colors duration-200 ${mode === 'login' ? 'border-b-2 border-sky-500 text-sky-600' : 'text-slate-500 hover:text-slate-800'}`}>
                Iniciar Sesión
            </button>
            <button onClick={() => handleModeChange('register')} className={`flex-1 py-3 text-sm sm:text-base font-semibold transition-colors duration-200 ${mode === 'register' ? 'border-b-2 border-sky-500 text-sky-600' : 'text-slate-500 hover:text-slate-800'}`}>
                Crear Usuario
            </button>
        </div>
        
        <form onSubmit={handleSubmit} className="space-y-4">
            <AuthInput id="legajo" type="text" value={legajo} onChange={(e) => setLegajo(e.target.value)} placeholder="Número de Legajo" icon="badge" disabled={isLoading} />
            
            {mode === 'register' && (
                <div className="h-10 px-3 flex items-center">
                    {legajoCheckLoading ? (
                        <div className="flex items-center gap-2 text-slate-500 text-sm">
                            <div className="border-2 border-slate-200 border-t-sky-500 rounded-full w-4 h-4 animate-spin"></div>
                            <span>Verificando legajo...</span>
                        </div>
                    ) : legajoError ? (
                        <p className="text-red-600 text-sm flex items-center gap-1.5"><span className="material-icons !text-base">error_outline</span>{legajoError}</p>
                    ) : registerStudentName ? (
                         <p className="text-teal-700 text-sm font-medium flex items-center gap-1.5"><span className="material-icons !text-base">check_circle</span>Estudiante: {registerStudentName}</p>
                    ): <p className="text-slate-500 text-xs">Ingresa tu legajo para verificar tu identidad.</p>}
                </div>
            )}

            <AuthInput id="password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Contraseña" icon="lock" disabled={isLoading}/>
            
            {mode === 'register' && (
                <AuthInput id="confirmPassword" type="password" value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} placeholder="Confirmar Contraseña" icon="lock_person" disabled={isLoading} />
            )}

            {error && <p className="text-red-600 text-sm text-center">{error}</p>}
            
            <button type="submit" disabled={isLoading || (mode === 'register' && (!registerStudentName || !!legajoError))} className="w-full bg-sky-600 text-white font-bold text-base py-3 px-6 rounded-lg transition-all duration-200 ease-in-out shadow-md hover:bg-sky-700 active:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 disabled:bg-slate-400 disabled:cursor-not-allowed flex items-center justify-center gap-3">
                {isLoading && <div className="border-2 border-white/50 border-t-white rounded-full w-5 h-5 animate-spin"></div>}
                <span>{mode === 'login' ? 'Ingresar' : 'Crear Cuenta'}</span>
            </button>
        </form>
    </div>
  );
};

const App = () => {
  const { useState, useEffect, useCallback } = React;

  const [authenticatedUser, setAuthenticatedUser] = useState(null);
  const [viewedStudent, setViewedStudent] = useState(null);
  
  const [practicas, setPracticas] = useState([]);
  const [solicitudes, setSolicitudes] = useState([]);
  const [isLoading, setIsLoading] = useState(true);
  const [modalInfo, setModalInfo] = useState(null);
  
  const [selectedOrientacion, setSelectedOrientacion] = useState("");
  const [studentAirtableId, setStudentAirtableId] = useState(null);

  const [criterios, setCriterios] = useState({
    horasTotales: 0,
    horasFaltantes250: HORAS_OBJETIVO_TOTAL,
    cumpleHorasTotales: false,
    horasOrientacionElegida: 0,
    horasFaltantesOrientacion: HORAS_OBJETIVO_ORIENTACION,
    cumpleHorasOrientacion: false,
    orientacionesCursadasCount: 0,
    orientacionesUnicas: [],
    cumpleRotacion: false,
  });

  const isSuperUserMode = authenticatedUser?.isSuperUser === true;

  useEffect(() => {
    if (!window.AIRTABLE_PAT_WARNING_SHOWN) {
        console.warn("ADVERTENCIA DE SEGURIDAD: El token PAT de Airtable está expuesto. Para producción, este código debe ejecutarse en un backend para proteger el token. Además, la lógica de autenticación del lado del cliente es inherentemente menos segura que una solución de backend dedicada.");
        window.AIRTABLE_PAT_WARNING_SHOWN = true;
    }
    
    const storedUser = sessionStorage.getItem('authenticatedUser');
    if (storedUser) {
        const user = JSON.parse(storedUser);
        setAuthenticatedUser(user);
    } else {
        setIsLoading(false);
    }
  }, []);

  const handleShowModal = (title, message) => {
    setModalInfo({ title, message });
  };

  const calculateCriterios = useCallback(() => {
    let totalHoras = 0;
    const matchedNormalizedOrientacionesEnumSet = new Set();

    practicas.forEach(p => {
      totalHoras += p[FIELD_HORAS_PRACTICAS] || 0;
      const especialidadPractica = p[FIELD_ESPECIALIDAD_PRACTICAS];

      if (especialidadPractica) {
        const normalizedEspecialidadFromPractice = normalizeStringForComparison(especialidadPractica); 
        for (const orientacionEnumValue of ALL_ORIENTACIONES) {
          if (normalizeStringForComparison(orientacionEnumValue) === normalizedEspecialidadFromPractice) {
            matchedNormalizedOrientacionesEnumSet.add(normalizeStringForComparison(orientacionEnumValue)); 
            break;
          }
        }
      }
    });

    let horasEnOrientacion = 0;
    if (selectedOrientacion) {
      const normalizedSelectedActualOrientacion = normalizeStringForComparison(selectedOrientacion); 
      practicas.forEach(p => {
        const especialidadPractica = p[FIELD_ESPECIALIDAD_PRACTICAS];
        if (especialidadPractica) {
            const normalizedEspecialidadFromPractice = normalizeStringForComparison(especialidadPractica);
            if (normalizedEspecialidadFromPractice === normalizedSelectedActualOrientacion) {
              horasEnOrientacion += p[FIELD_HORAS_PRACTICAS] || 0;
            }
        }
      });
    }
    
    const horasFaltantesOrientacion = Math.max(0, HORAS_OBJETIVO_ORIENTACION - horasEnOrientacion);

    const newCriterios = {
      horasTotales: totalHoras,
      horasFaltantes250: Math.max(0, HORAS_OBJETIVO_TOTAL - totalHoras),
      cumpleHorasTotales: totalHoras >= HORAS_OBJETIVO_TOTAL,
      horasOrientacionElegida: horasEnOrientacion,
      horasFaltantesOrientacion: horasFaltantesOrientacion,
      cumpleHorasOrientacion: selectedOrientacion ? horasEnOrientacion >= HORAS_OBJETIVO_ORIENTACION : false,
      orientacionesCursadasCount: matchedNormalizedOrientacionesEnumSet.size,
      orientacionesUnicas: Array.from(matchedNormalizedOrientacionesEnumSet).map(normalizedEnum => {
        const originalEnumValue = ALL_ORIENTACIONES.find(o => normalizeStringForComparison(o) === normalizedEnum);
        return originalEnumValue || (normalizedEnum.charAt(0).toUpperCase() + normalizedEnum.slice(1));
      }),
      cumpleRotacion: matchedNormalizedOrientacionesEnumSet.size >= ROTACION_OBJETIVO_ORIENTACIONES,
    };
    setCriterios(newCriterios);
  }, [practicas, selectedOrientacion]);

  useEffect(() => {
    calculateCriterios();
  }, [practicas, selectedOrientacion, calculateCriterios]);

  const resetStateForDataFetch = () => {
    setPracticas([]);
    setSolicitudes([]);
    setSelectedOrientacion("");
    setViewedStudent(null);
    setStudentAirtableId(null);
    setCriterios({
      horasTotales: 0,
      horasFaltantes250: HORAS_OBJETIVO_TOTAL,
      cumpleHorasTotales: false,
      horasOrientacionElegida: 0,
      horasFaltantesOrientacion: HORAS_OBJETIVO_ORIENTACION,
      cumpleHorasOrientacion: false,
      orientacionesCursadasCount: 0,
      orientacionesUnicas: [],
      cumpleRotacion: false,
    });
  };
  
  const fetchDataForUser = useCallback(async (legajo, studentName) => {
    setIsLoading(true);
    setPracticas([]);
    setSolicitudes([]);
    let foundAnyData = false;

    try {
        const { records: practicasRecords, error: practicasError } = await fetchAirtableData(
          AIRTABLE_TABLE_NAME_PRACTICAS,
          [FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS, FIELD_HORAS_PRACTICAS, FIELD_FECHA_INICIO_PRACTICAS, FIELD_FECHA_FIN_PRACTICAS, FIELD_ESTADO_PRACTICA, FIELD_ESPECIALIDAD_PRACTICAS],
          `{${FIELD_NOMBRE_BUSQUEDA_PRACTICAS}} = '${studentName}'`
        );

        if (practicasError) handleShowModal('Error de Carga', `Error al cargar prácticas: ${typeof practicasError.error === 'string' ? practicasError.error : practicasError.error.message}`);
        else if (practicasRecords.length > 0) {
          setPracticas(practicasRecords.map(r => ({ ...r.fields, id: r.id })));
          foundAnyData = true;
        }

      const { records: solicitudesRecords, error: solicitudesError } = await fetchAirtableData(
        AIRTABLE_TABLE_NAME_PPS,
        [FIELD_EMPRESA_PPS_SOLICITUD, FIELD_ESTADO_PPS, FIELD_NOTAS_PPS, FIELD_ULTIMA_ACTUALIZACION_PPS],
        `{${FIELD_LEGAJO_PPS}} = '${legajo.trim()}'`
      );

      if (solicitudesError) handleShowModal('Error de Carga', `Error al cargar solicitudes: ${typeof solicitudesError.error === 'string' ? solicitudesError.error : solicitudesError.error.message}`);
      else if (solicitudesRecords.length > 0) {
        setSolicitudes(solicitudesRecords.map(r => ({ ...r.fields, id: r.id })));
        foundAnyData = true;
      }
      
      if (!foundAnyData && !isSuperUserMode) {
        handleShowModal('Sin Resultados', `No se encontró información de prácticas o solicitudes para ${studentName}. Puedes empezar a cargar tus datos en el sistema de la universidad.`);
      }

    } catch (error) {
      console.error('Error en el proceso de búsqueda general:', error);
      handleShowModal('Error Crítico', `Ocurrió un error inesperado: ${error.message || 'Por favor, intenta de nuevo más tarde.'}`);
    } finally {
      setIsLoading(false);
    }
  }, [isSuperUserMode]);

  const handleAdminSearch = async (legajo) => {
      setIsLoading(true);
      resetStateForDataFetch();
      
      let studentName = null;
      try {
          const { records: studentRecords, error: studentError } = await fetchAirtableData(
              AIRTABLE_TABLE_NAME_ESTUDIANTES,
              [FIELD_NOMBRE_ESTUDIANTES, FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES],
              `{${FIELD_LEGAJO_ESTUDIANTES}} = '${legajo}'`,
              1
          );
          if (studentError) throw new Error(`Error al buscar en 'Estudiantes': ${typeof studentError.error === 'string' ? studentError.error : studentError.error.message}`);

          if (studentRecords.length > 0 && studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES]) {
              const studentRecord = studentRecords[0];
              studentName = studentRecord.fields[FIELD_NOMBRE_ESTUDIANTES];
              setStudentAirtableId(studentRecord.id);
              const savedOrientacion = studentRecord.fields[FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES];
              if (savedOrientacion) {
                  setSelectedOrientacion(savedOrientacion);
              }
          } else {
              const { records: ppsRecords, error: ppsError } = await fetchAirtableData(
                  AIRTABLE_TABLE_NAME_PPS,
                  [FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS],
                  `{${FIELD_LEGAJO_PPS}} = '${legajo}'`,
                  1
              );
              if (ppsError) throw new Error(`Error al buscar en 'Solicitud de PPS': ${typeof ppsError.error === 'string' ? ppsError.error : ppsError.error.message}`);

              if (ppsRecords.length > 0) {
                  const nameField = ppsRecords[0].fields[FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS];
                  if (Array.isArray(nameField) && nameField.length > 0) studentName = nameField[0];
                  else if (typeof nameField === 'string') studentName = nameField;
              }
          }

          if (studentName) {
              setViewedStudent({ legajo, nombre: studentName });
              await fetchDataForUser(legajo, studentName);
          } else {
              handleShowModal('Sin Resultados', `No se encontró un estudiante con el legajo ${legajo}.`);
              setIsLoading(false);
          }
      } catch (e) {
          console.error('[AdminSearch] Error:', e);
          handleShowModal('Error de Búsqueda', e.message || 'Ocurrió un error al buscar al estudiante.');
          setIsLoading(false);
      }
  };

  useEffect(() => {
    if (authenticatedUser && !isSuperUserMode) {
        const initializeUserData = async () => {
            setIsLoading(true);
            resetStateForDataFetch();

            const { records: studentRecords, error: studentError } = await fetchAirtableData(
                AIRTABLE_TABLE_NAME_ESTUDIANTES,
                [FIELD_NOMBRE_ESTUDIANTES, FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES],
                `{${FIELD_LEGAJO_ESTUDIANTES}} = '${authenticatedUser.legajo}'`,
                1
            );
            
            if (studentError) {
              console.error("Could not fetch student record for pre-filling orientation", studentError);
            }

            if (studentRecords && studentRecords.length > 0) {
                const studentRecord = studentRecords[0];
                setStudentAirtableId(studentRecord.id);
                const savedOrientacion = studentRecord.fields[FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES];
                if (savedOrientacion) {
                    setSelectedOrientacion(savedOrientacion);
                }
            }
            await fetchDataForUser(authenticatedUser.legajo, authenticatedUser.nombre);
        };
        initializeUserData();

    } else if (!authenticatedUser) {
        setIsLoading(false);
    }
  }, [authenticatedUser, isSuperUserMode, fetchDataForUser]);

  const handleOrientacionChange = async (orientacion) => {
    setSelectedOrientacion(orientacion);

    if (studentAirtableId) {
        const { error } = await updateAirtableRecord(
            AIRTABLE_TABLE_NAME_ESTUDIANTES,
            studentAirtableId,
            { [FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES]: orientacion || null }
        );

        if (error) {
            console.error("Failed to update chosen orientation in Airtable:", error);
            handleShowModal('Error de Sincronización', 'No se pudo guardar la orientación elegida. La selección funcionará localmente pero no se guardará para futuras sesiones.');
        }
    }
  };

  const handleLoginSuccess = (user) => {
    setAuthenticatedUser(user);
    sessionStorage.setItem('authenticatedUser', JSON.stringify(user));
    if(user.isSuperUser){
      setIsLoading(false);
    }
  };
  
  const handleLogout = () => {
    setAuthenticatedUser(null);
    sessionStorage.removeItem('authenticatedUser');
    resetStateForDataFetch();
  };

  const showData = (!isLoading && authenticatedUser && !isSuperUserMode) || (isSuperUserMode && viewedStudent && !isLoading);

  return (
    <div className="w-full max-w-4xl mx-auto p-4 sm:p-6 md:p-8 flex flex-col min-h-screen">
      <div className="flex-grow">
        <AppHeader isLoggedIn={!!authenticatedUser} onLogout={handleLogout} isSuperUserMode={isSuperUserMode} />
        
        {isLoading && !authenticatedUser && <Loader />}

        {!isLoading && !authenticatedUser && (
          <Auth onLoginSuccess={handleLoginSuccess} showModal={handleShowModal} />
        )}

        {authenticatedUser && (
          <React.Fragment>
            {isSuperUserMode && (
              <React.Fragment>
                <AdminSearch onSearch={handleAdminSearch} isLoading={isLoading} />
                {isLoading && <Loader />}
                {viewedStudent && !isLoading && (
                  <div className="space-y-8 mt-8">
                    <CriteriosPanel 
                      criterios={criterios} 
                      selectedOrientacion={selectedOrientacion}
                      onOrientacionChange={handleOrientacionChange}
                      studentName={viewedStudent.nombre}
                      isSuperUserMode={true}
                    />
                    <SolicitudesList solicitudes={solicitudes} />
                    <PracticasTable practicas={practicas} />
                    <Footer />
                  </div>
                )}
              </React.Fragment>
            )}

            {!isSuperUserMode && (
              <React.Fragment>
                {isLoading && <Loader />}
                {showData && (
                  <div className="space-y-8">
                      <CriteriosPanel 
                          criterios={criterios} 
                          selectedOrientacion={selectedOrientacion}
                          onOrientacionChange={handleOrientacionChange}
                          studentName={authenticatedUser.nombre}
                      />
                      <SolicitudesList solicitudes={solicitudes} />
                      <PracticasTable practicas={practicas} />
                      <Footer />
                  </div>
                )}
              </React.Fragment>
            )}
          </React.Fragment>
        )}
      </div>
      
      <Modal
        isOpen={!!modalInfo}
        title={modalInfo?.title || ''}
        message={modalInfo?.message || ''}
        onClose={() => setModalInfo(null)}
      />
    </div>
  );
};

// From: index.tsx (entry point)
// ---
const rootElement = document.getElementById('root');
if (!rootElement) {
  throw new Error("Could not find root element to mount to");
}

const root = ReactDOM.createRoot(rootElement);
root.render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);

// --- Injected Code Ends ---
    </script>
</body>
</html>
