    <style>
      body {
        font-family: 'Inter', sans-serif;
        /* Updated professional background */
        background-color: #f9fafb; /* bg-gray-50 */
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      html, body {
        width: 100%;
        margin: 0;
        padding: 0;
        scroll-behavior: smooth;
      }
      #root {
        min-height: 100vh;
      }

      /* -- Custom Animations -- */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        opacity: 0; /* Start hidden */
        will-change: transform, opacity;
      }
      
      /* Subtle scale-in for modals and cards */
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.96); }
        to { opacity: 1; transform: scale(1); }
      }
       .animate-scale-in {
        animation: scaleIn 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        will-change: transform, opacity;
      }

      /* Shimmer effect for loading placeholders */
      @keyframes background-shine {
        from {
          background-position: 200% 0;
        }
        to {
          background-position: -200% 0;
        }
      }
      .animate-background-shine {
        animation: background-shine 1.5s linear infinite;
        background: linear-gradient(110deg, theme(colors.slate.200/50) 8%, theme(colors.slate.100/80) 18%, theme(colors.slate.200/50) 33%);
        background-size: 200% 100%;
        will-change: background-position;
      }
      
      /* -- Prose styles for AI-generated content -- */
      .prose {
          color: theme(colors.slate.700);
          line-height: 1.7;
          max-width: none;
      }
      .prose p {
          margin-bottom: 1em;
      }
      .prose h1, .prose h2, .prose h3 {
          color: theme(colors.slate.900);
          line-height: 1.3;
          font-weight: 700;
          margin-bottom: 0.8em;
          margin-top: 1.5em;
      }
      .prose h2 {
          font-size: 1.5em;
          padding-bottom: 0.4em;
          border-bottom: 1px solid theme(colors.slate.200);
      }
      .prose h3 {
          font-size: 1.25em;
      }
      .prose strong {
          font-weight: 600;
          color: theme(colors.slate.800);
      }
      .prose ul {
          list-style-type: disc;
          padding-left: 1.5em;
          margin-top: 1em;
          margin-bottom: 1em;
      }
      .prose li {
          margin-bottom: 0.5em;
      }
      .prose hr {
          margin-top: 2em;
          margin-bottom: 2em;
          border-top: 1px solid theme(colors.slate.200);
      }
    </style>
