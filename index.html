function formatDate(dateString) {
    if (!dateString) return 'N/A';
    try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) {
            return 'Fecha inválida';
        }
        return date.toLocaleDateString('es-ES', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });
    } catch (e) {
        return 'Fecha inválida';
    }
}

function getEspecialidadClasses(especialidad) {
    if (!especialidad) return 'bg-gray-200 text-gray-700 border border-gray-300';
    
    const baseClasses = "font-medium py-0.5 px-2 rounded text-xs border";
    const normalizedEspecialidad = especialidad.toLowerCase().trim();
    switch (normalizedEspecialidad) {
        case 'clínica':
        case 'clinica':
            return `${baseClasses} bg-green-100 text-green-700 border-green-300`;
        case 'educacional':
            return `${baseClasses} bg-blue-100 text-blue-700 border-blue-300`;
        case 'laboral':
            return `${baseClasses} bg-red-100 text-red-700 border-red-300`;
        case 'comunitaria':
            return `${baseClasses} bg-purple-100 text-purple-700 border-purple-300`;
        default:
            return `${baseClasses} bg-gray-100 text-gray-700 border-gray-300`;
    }
}

function getStatusBadgeClasses(status) {
    if (!status) return 'bg-gray-200 text-gray-700';
    
    const baseClasses = "py-1 px-3 rounded-full text-xs font-semibold capitalize";
    switch (status.toLowerCase().trim()) {

        case 'en curso':

        case 'rechazada':

        case 'iniciada':
             return `${baseClasses} bg-blue-100 text-blue-700`;
        default:
            return `${baseClasses} bg-gray-200 text-gray-700`;
    }
}

function normalizeStringForComparison(str) {
  if (!str) return "";
  return str
    .normalize("NFD")
    .replace(/[\\u0300-\\u036f]/g, "")
    .toLowerCase()
    .trim();
}

// --- START OF services/airtableService.ts ---
async function fetchDataGeneric(url) {
    try {
        const response = await fetch(url, {
            headers: { 'Authorization': \`Bearer ${AIRTABLE_PAT}\` }
        });

        if (!response.ok) {
            let errorData;
            try {
                const jsonError = await response.json();
                errorData = jsonError; 
                if (typeof errorData.error !== 'object' && typeof errorData.error !== 'string') {
                     errorData = { error: { type: \`HTTP_ERROR_${response.status}\`, message: \`Error ${response.status}: ${response.statusText}. Response not a valid error JSON.\` }};
                }
            } catch (e) {
                const textError = await response.text().catch(() => "Could not read error response body.");
                errorData = { error: { type: \`HTTP_ERROR_${response.status}\`, message: \`Error ${response.status}: ${textError}\` } };
            }
            console.error('[fetchDataGeneric] Airtable API Error:', response.status, JSON.stringify(errorData), "URL:", url);
            return { data: null, error: errorData };
        }
        
        const textResponse = await response.text();
        if (!textResponse) {
            return { data: { records: [] }, error: null };
        }

        try {
            const jsonData = JSON.parse(textResponse);
            return { data: { records: jsonData.records || [], offset: jsonData.offset }, error: null };
        } catch (jsonParseError) {
            console.error('[fetchDataGeneric] JSON Parse Error:', jsonParseError, "Response Text:", textResponse);
            return { data: null, error: { error: { type: 'JSON_PARSE_ERROR', message: 'La respuesta del servidor no pudo ser procesada (JSON inválido).' } } };
        }

    } catch (networkError) {
        console.error('[fetchDataGeneric] Network or Fetch Error:', networkError, "URL:", url);
        return { data: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor. Revisa tu conexión a internet.' } } };
    }
}

async function fetchAirtableData(
    tableName, 
    fields = [], 
    filterByFormula,
    maxRecords
) {
    let url = \`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}\`;
    const params = new URLSearchParams();

    fields.forEach(field => params.append('fields[]', field));
    if (filterByFormula) {
        params.set('filterByFormula', filterByFormula);
    }
    if (maxRecords) {
        params.set('maxRecords', maxRecords.toString());
    }
    
    const queryString = params.toString();
    if (queryString) {
        url += \`?${queryString}\`;
    }

    const { data, error } = await fetchDataGeneric(url);
    if (error || !data) {
        return { records: [], error: error || { error: { type: 'UNKNOWN_ERROR', message: 'An unknown error occurred.'}} };
    }
    return { records: data.records, error: null };
}

// --- START OF App.tsx ---
const App = () => {
  const [legajo, setLegajo] = useState('');
  const [studentName, setStudentName] = useState(null);
  const [actualLegajoSearched, setActualLegajoSearched] = useState(null);
  const [practicas, setPracticas] = useState([]);
  const [solicitudes, setSolicitudes] = useState([]);
  const [isLoading, setIsLoading] = useState(false);
  const [modalInfo, setModalInfo] = useState(null);
  const [showDisclaimer, setShowDisclaimer] = useState(false);
  
  const [selectedOrientacion, setSelectedOrientacion] = useState("");
  const [criterios, setCriterios] = useState({
    horasTotales: 0,
    horasFaltantes250: HORAS_OBJETIVO_TOTAL,
    cumpleHorasTotales: false,
    horasOrientacionElegida: 0,
    cumpleHorasOrientacion: false,
    orientacionesCursadasCount: 0,
    orientacionesUnicas: [],
    cumpleRotacion: false,
  });

  useEffect(() => {
    if (typeof window !== 'undefined' && !window.AIRTABLE_PAT_WARNING_SHOWN) {
        console.warn("ADVERTENCIA DE SEGURIDAD: El token PAT de Airtable está expuesto. Para producción, este código debe ejecutarse en un backend para proteger el token.");
        window.AIRTABLE_PAT_WARNING_SHOWN = true;
    }
  }, []);

  const handleShowModal = (title, message) => {
    setModalInfo({ title, message });
  };

  const calculateCriterios = useCallback(() => {
    let totalHoras = 0;
    const matchedNormalizedOrientacionesEnumSet = new Set();

    practicas.forEach(p => {
      totalHoras += p[FIELD_HORAS_PRACTICAS] || 0;
      const especialidadPractica = p[FIELD_ESPECIALIDAD_PRACTICAS]; 

      if (especialidadPractica) {
        const normalizedEspecialidadFromPractice = normalizeStringForComparison(especialidadPractica); 
        for (const orientacionEnumValue of ALL_ORIENTACIONES) {
          if (normalizeStringForComparison(orientacionEnumValue) === normalizedEspecialidadFromPractice) {
            matchedNormalizedOrientacionesEnumSet.add(normalizeStringForComparison(orientacionEnumValue)); 
            break; 
          }
        }
      }
    });

    let horasEnOrientacion = 0;
    if (selectedOrientacion) { 
      const normalizedSelectedActualOrientacion = normalizeStringForComparison(selectedOrientacion); 
      practicas.forEach(p => {
        const especialidadPractica = p[FIELD_ESPECIALIDAD_PRACTICAS];
        if (especialidadPractica) {
            const normalizedEspecialidadFromPractice = normalizeStringForComparison(especialidadPractica);
            if (normalizedEspecialidadFromPractice === normalizedSelectedActualOrientacion) {
              horasEnOrientacion += p[FIELD_HORAS_PRACTICAS] || 0;
            }
        }
      });
    }
    
    const newCriterios = {
      horasTotales: totalHoras,
      horasFaltantes250: Math.max(0, HORAS_OBJETIVO_TOTAL - totalHoras),
      cumpleHorasTotales: totalHoras >= HORAS_OBJETIVO_TOTAL,
      horasOrientacionElegida: horasEnOrientacion,
      cumpleHorasOrientacion: selectedOrientacion ? horasEnOrientacion >= HORAS_OBJETIVO_ORIENTACION : false,
      orientacionesCursadasCount: matchedNormalizedOrientacionesEnumSet.size,
      orientacionesUnicas: Array.from(matchedNormalizedOrientacionesEnumSet).map(normalizedEnum => {
        const originalEnumValue = ALL_ORIENTACIONES.find(o => normalizeStringForComparison(o) === normalizedEnum);
        return originalEnumValue || (normalizedEnum.charAt(0).toUpperCase() + normalizedEnum.slice(1));
      }),
      cumpleRotacion: matchedNormalizedOrientacionesEnumSet.size >= ROTACION_OBJETIVO_ORIENTACIONES,
    };
    setCriterios(newCriterios);
  }, [practicas, selectedOrientacion]);


  useEffect(() => {
    if (practicas.length > 0) {
      calculateCriterios();
    } else { 
        setCriterios(prev => ({
            ...prev,
            horasTotales: 0,
            horasFaltantes250: HORAS_OBJETIVO_TOTAL,
            cumpleHorasTotales: false,
            horasOrientacionElegida: 0,
            cumpleHorasOrientacion: false,
            orientacionesCursadasCount: 0,
            orientacionesUnicas: [],
            cumpleRotacion: false,
        }));
    }
  }, [practicas, selectedOrientacion, calculateCriterios]);


  const resetState = () => {
    setStudentName(null);
    setPracticas([]);
    setSolicitudes([]);
    setShowDisclaimer(false);
    setSelectedOrientacion("");
    setCriterios({
      horasTotales: 0,
      horasFaltantes250: HORAS_OBJETIVO_TOTAL,
      cumpleHorasTotales: false,
      horasOrientacionElegida: 0,
      cumpleHorasOrientacion: false,
      orientacionesCursadasCount: 0,
      orientacionesUnicas: [],
      cumpleRotacion: false,
    });
  };

  const handleSearch = async () => {
    if (!legajo.trim()) {
      handleShowModal('Entrada Inválida', 'Por favor, ingresa tu número de legajo.');
      return;
    }
    
    setIsLoading(true);
    resetState(); 
    setActualLegajoSearched(legajo.trim());
    let foundAnyData = false;
    let currentStudentName = null;

    try {
      const { records: studentRecords, error: studentError } = await fetchAirtableData(
        AIRTABLE_TABLE_NAME_ESTUDIANTES,
        [FIELD_NOMBRE_ESTUDIANTES],
        \`{${FIELD_LEGAJO_ESTUDIANTES}} = '${legajo.trim()}'\`,
        1
      );

      if (studentError) {
        console.warn("Error buscando en tabla Estudiantes:", studentError.error);
      } else if (studentRecords.length > 0 && studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES]) {
        currentStudentName = studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES];
      }

      if (!currentStudentName) {
        const { records: ppsNameRecords, error: ppsNameError } = await fetchAirtableData(
          AIRTABLE_TABLE_NAME_PPS,
          [FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS],
          \`{${FIELD_LEGAJO_PPS}} = '${legajo.trim()}'\`,
          1
        );
        if (ppsNameError) {
           console.warn("Error buscando nombre en tabla PPS:", ppsNameError.error);
        } else if (ppsNameRecords.length > 0) {
            const nameField = ppsNameRecords[0].fields[FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS];
            if (Array.isArray(nameField) && nameField.length > 0) {
                currentStudentName = nameField[0];
            } else if (typeof nameField === 'string') {
                currentStudentName = nameField;
            }
        }
      }
      
      setStudentName(currentStudentName || legajo.trim());

      if (currentStudentName) {
        const { records: practicasRecords, error: practicasError } = await fetchAirtableData(
          AIRTABLE_TABLE_NAME_PRACTICAS,
          [FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS, FIELD_HORAS_PRACTICAS, FIELD_FECHA_INICIO_PRACTICAS, FIELD_FECHA_FIN_PRACTICAS, FIELD_ESTADO_PRACTICA, FIELD_ESPECIALIDAD_PRACTICAS],
          \`{${FIELD_NOMBRE_BUSQUEDA_PRACTICAS}} = '${currentStudentName}'\`
        );

        if (practicasError) {
          handleShowModal('Error de Carga', \`Error al cargar pr\xE1cticas: ${typeof practicasError.error === 'string' ? practicasError.error : practicasError.error.message}\`);
        } else if (practicasRecords.length > 0) {
          setPracticas(practicasRecords.map(r => ({ ...r.fields, id: r.id })));
          foundAnyData = true;
        }
      } else {
         console.warn("No se pudo obtener el nombre del estudiante, no se buscar\xE1n pr\xE1cticas.");
      }

      const { records: solicitudesRecords, error: solicitudesError } = await fetchAirtableData(
        AIRTABLE_TABLE_NAME_PPS,
        [FIELD_EMPRESA_PPS_SOLICITUD, FIELD_ESTADO_PPS, FIELD_NOTAS_PPS, FIELD_ULTIMA_ACTUALIZACION_PPS],
        \`{${FIELD_LEGAJO_PPS}} = '${legajo.trim()}'\`
      );

      if (solicitudesError) {
        handleShowModal('Error de Carga', \`Error al cargar solicitudes: ${typeof solicitudesError.error === 'string' ? solicitudesError.error : solicitudesError.error.message}\`);
      } else if (solicitudesRecords.length > 0) {
        setSolicitudes(solicitudesRecords.map(r => ({ ...r.fields, id: r.id })));
        foundAnyData = true;
      }
      
      if (foundAnyData) {
        setShowDisclaimer(true);
      } else {
        setStudentName(null); 
        handleShowModal('Sin Resultados', \`No se encontr\xF3 informaci\xF3n asociada al legajo ${legajo.trim()}. Verifica que el n\xFAmero sea correcto.\`);
      }

    } catch (error) {
      console.error('Error en el proceso de búsqueda general:', error);
      handleShowModal('Error Crítico', \`Ocurri\xF3 un error inesperado: ${error.message || 'Por favor, intenta de nuevo m\xE1s tarde.'}\`);
    } finally {
      setIsLoading(false);
    }
  };
  
  const handleKeyPress = (event) => {
    if (event.key === 'Enter') {
      event.preventDefault();
      handleSearch();
    }
  };

  return (
    _jsxs("div", { className: "w-full max-w-4xl mx-auto p-6 sm:p-8 md:p-10 bg-white rounded-2xl shadow-xl border border-slate-200/80", children: [
      _jsx(AppHeader, {}),
      _jsx(LegajoInput, { value: legajo, onChange: setLegajo, onKeyPress: handleKeyPress, disabled: isLoading }),
      _jsx(SearchButton, { onClick: handleSearch, disabled: isLoading }),

      isLoading && _jsx(Loader, {}),

      !isLoading && studentName && actualLegajoSearched && (
        _jsx("div", { className: "mt-10", children: 
          _jsx(StudentInfoHeader, { studentName: studentName, legajo: actualLegajoSearched })
         })
      ),
      
      !isLoading && practicas.length > 0 && (
           _jsx(CriteriosPanel, { 
            criterios: criterios, 
            selectedOrientacion: selectedOrientacion,
            onOrientacionChange: setSelectedOrientacion,
            hasPracticas: true
          })
      ),
      
      !isLoading && (studentName || practicas.length > 0 || solicitudes.length > 0) && ( 
        _jsxs(_Fragment, { children: [
          _jsx(PracticasTable, { practicas: practicas }),
          _jsx(SolicitudesList, { solicitudes: solicitudes })
        ] })
      ),

      !isLoading && showDisclaimer && _jsx(Disclaimer, {}),
      
      _jsx(Modal, {
        isOpen: !!modalInfo,
        title: modalInfo?.title || '',
        message: modalInfo?.message || '',
        onClose: () => setModalInfo(null)
      })
    ] })
  );
};
