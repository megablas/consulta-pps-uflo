function formatDate(dateString) {
    if (!dateString) return 'N/A';
    try {
        const date = new Date(dateString);
        if (isNaN(date.getTime())) {
            return 'Fecha inválida';
        }
        return date.toLocaleDateString('es-ES', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        });
    } catch (e) {
        return 'Fecha inválida';
    }
}
function getEspecialidadClasses(especialidad) {
    if (!especialidad) return 'bg-slate-100 text-slate-800 border-slate-200';
    const baseClasses = "inline-flex items-center font-medium py-1 px-2.5 rounded-full text-xs border";
    const normalizedEspecialidad = normalizeStringForComparison(especialidad);
    switch (normalizedEspecialidad) {
        case 'clinica':
            return `${baseClasses} bg-teal-100 text-teal-800 border-teal-200`;
        case 'educacional':
            return `${baseClasses} bg-sky-100 text-sky-800 border-sky-200`;
        case 'laboral':
            return `${baseClasses} bg-rose-100 text-rose-800 border-rose-200`;
        case 'comunitaria':
            return `${baseClasses} bg-violet-100 text-violet-800 border-violet-200`;
        default:
            return `${baseClasses} bg-slate-100 text-slate-800 border-slate-200`;
    }
}
function getStatusVisuals(status) {
    const normalizedStatus = normalizeStringForComparison(status);
    const baseLabel = "inline-flex items-center font-semibold px-2.5 py-1 rounded-full text-xs capitalize";
    const baseIconContainer = "flex-shrink-0 size-11 rounded-lg flex items-center justify-center mr-4";
    if (normalizedStatus.includes('pps realiazada') || normalizedStatus.includes('convenio realizado') || normalizedStatus.includes('finalizada')) {
        return {
            icon: 'check_circle',
            iconContainerClass: `${baseIconContainer} bg-teal-100 text-teal-600`,
            labelClass: `${baseLabel} bg-teal-100 text-teal-800`,
        };
    }
    if (normalizedStatus.includes('no se pudo concretar')) {
        return {
            icon: 'error',
            iconContainerClass: `${baseIconContainer} bg-rose-100 text-rose-600`,
            labelClass: `${baseLabel} bg-rose-100 text-rose-800`,
        };
    }
    if (normalizedStatus.includes('en conversaciones') || normalizedStatus.includes('realizando convenio') || normalizedStatus.includes('en curso')) {
        return {
            icon: 'hourglass_top',
            iconContainerClass: `${baseIconContainer} bg-yellow-100 text-yellow-600`,
            labelClass: `${baseLabel} bg-yellow-100 text-yellow-800`,
        };
    }
    if (normalizedStatus.includes('puesta en contacto')) {
        return {
            icon: 'rocket_launch',
            iconContainerClass: `${baseIconContainer} bg-sky-100 text-sky-600`,
            labelClass: `${baseLabel} bg-sky-100 text-sky-800`,
        };
    }
    return {
        icon: 'help_outline',
        iconContainerClass: `${baseIconContainer} bg-slate-100 text-slate-500`,
        labelClass: `${baseLabel} bg-slate-100 text-slate-800`,
    };
}
function normalizeStringForComparison(str) {
  if (!str) return "";
  return str
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function bufferToHex(buffer) {
  return [...new Uint8Array(buffer)]
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}
function generateSalt() {
  const salt = window.crypto.getRandomValues(new Uint8Array(16));
  return bufferToHex(salt);
}
async function hashPassword(password, salt) {
  const encoder = new TextEncoder();
  const passwordWithSalt = encoder.encode(password + salt);
  const hashBuffer = await window.crypto.subtle.digest('SHA-256', passwordWithSalt);
  return bufferToHex(hashBuffer);
}
async function verifyPassword(password, salt, storedHash) {
  const newHash = await hashPassword(password, salt);
  return newHash === storedHash;
}

async function fetchDataGeneric(url) {
    try {
        const response = await fetch(url, {
            headers: { 'Authorization': `Bearer ${AIRTABLE_PAT}` }
        });
        if (!response.ok) {
            let errorData;
            try {
                const jsonError = await response.json();
                errorData = jsonError;
                if (typeof errorData.error !== 'object' && typeof errorData.error !== 'string') {
                     errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${response.statusText}. Response not a valid error JSON.` }};
                }
            } catch (e) {
                const textError = await response.text().catch(() => "Could not read error response body.");
                errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
            }
            console.error('[fetchDataGeneric] Airtable API Error:', response.status, JSON.stringify(errorData), "URL:", url);
            return { data: null, error: errorData };
        }
        const textResponse = await response.text();
        if (!textResponse) {
            return { data: { records: [] }, error: null };
        }
        try {
            const jsonData = JSON.parse(textResponse);
            return { data: { records: jsonData.records || [], offset: jsonData.offset }, error: null };
        } catch (jsonParseError) {
            console.error('[fetchDataGeneric] JSON Parse Error:', jsonParseError, "Response Text:", textResponse);
            return { data: null, error: { error: { type: 'JSON_PARSE_ERROR', message: 'La respuesta del servidor no pudo ser procesada (JSON inválido).' } } };
        }
    } catch (networkError) {
        console.error('[fetchDataGeneric] Network or Fetch Error:', networkError, "URL:", url);
        return { data: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor. Revisa tu conexión a internet.' } } };
    }
}
async function createAirtableRecord(tableName, fields) {
  const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}`;
  try {
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_PAT}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        records: [{ fields }]
      })
    });
    if (!response.ok) {
       let errorData;
       try {
           const jsonError = await response.json();
           errorData = jsonError;
       } catch (e) {
           const textError = await response.text().catch(() => "Could not read error response body.");
           errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
       }
       console.error('[createAirtableRecord] Airtable API Error:', response.status, JSON.stringify(errorData));
       return { record: null, error: errorData };
    }
    const data = await response.json();
    if (data.records && data.records.length > 0) {
      return { record: data.records[0], error: null };
    } else {
      return { record: null, error: { error: { type: 'CREATE_FAILED', message: 'La creación del registro no devolvió el registro esperado.' } } };
    }
  } catch (networkError) {
    console.error('[createAirtableRecord] Network or Fetch Error:', networkError);
    return { record: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor. Revisa tu conexión a internet.' } } };
  }
}
async function updateAirtableRecord(tableName, recordId, fields) {
  const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}/${recordId}`;
  try {
    const response = await fetch(url, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${AIRTABLE_PAT}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ fields })
    });
    if (!response.ok) {
       let errorData;
       try {
           const jsonError = await response.json();
           errorData = jsonError;
       } catch (e) {
           const textError = await response.text().catch(() => "Could not read error response body.");
           errorData = { error: { type: `HTTP_ERROR_${response.status}`, message: `Error ${response.status}: ${textError}` } };
       }
       console.error('[updateAirtableRecord] Airtable API Error:', response.status, JSON.stringify(errorData));
       return { record: null, error: errorData };
    }
    const record = await response.json();
    return { record, error: null };
  } catch (networkError) {
    console.error('[updateAirtableRecord] Network or Fetch Error:', networkError);
    return { record: null, error: { error: { type: 'NETWORK_ERROR', message: 'No se pudo conectar con el servidor. Revisa tu conexión a internet.' } } };
  }
}
async function fetchAirtableData(tableName, fields = [], filterByFormula, maxRecords) {
    let url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(tableName)}`;
    const params = new URLSearchParams();
    fields.forEach(field => params.append('fields[]', field));
    if (filterByFormula) {
        params.set('filterByFormula', filterByFormula);
    }
    if (maxRecords) {
        params.set('maxRecords', maxRecords.toString());
    }
    const queryString = params.toString();
    if (queryString) {
        url += `?${queryString}`;
    }
    const { data, error } = await fetchDataGeneric(url);
    if (error || !data) {
        return { records: [], error: error || { error: { type: 'UNKNOWN_ERROR', message: 'An unknown error occurred.'}} };
    }
    return { records: data.records, error: null };
}

const SortableHeader = ({ label, sortKey, sortConfig, requestSort, className = "text-center" }) => {
  const isActive = sortConfig.key === sortKey;
  const icon = isActive ? (sortConfig.direction === 'ascending' ? 'arrow_upward' : 'arrow_downward') : 'unfold_more';
  return (
    <th className={`px-4 py-4 ${className} cursor-pointer select-none group transition-colors hover:bg-slate-100/70 text-slate-700 font-bold text-sm tracking-wider uppercase`} onClick={() => requestSort(sortKey)}>
      <div className="flex items-center justify-center gap-2">
        <span>{label}</span>
        <span className={`material-icons !text-base transition-opacity ${isActive ? 'opacity-80' : 'opacity-40 group-hover:opacity-60'}`}>{icon}</span>
      </div>
    </th>
  );
};
const PracticasTable = ({ practicas, selectedOrientacion }) => {
    const [sortConfig, setSortConfig] = useState({ key: 'fechaInicio', direction: 'descending' });
    const sortedPracticas = React.useMemo(() => {
        let processableItems = [...practicas];
        if (sortConfig.key !== null) {
            processableItems.sort((a, b) => {
                let aValue, bValue;
                const safeGetTime = (dateStr) => {
                    if (!dateStr) return 0;
                    const date = new Date(dateStr);
                    return isNaN(date.getTime()) ? 0 : date.getTime();
                };
                switch(sortConfig.key) {
                    case 'institucion':
                        aValue = normalizeStringForComparison(Array.isArray(a[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS]) ? a[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS]?.[0] : a[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS]);
                        bValue = normalizeStringForComparison(Array.isArray(b[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS]) ? b[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS]?.[0] : b[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS]);
                        break;
                    case 'especialidad':
                        aValue = normalizeStringForComparison(a[FIELD_ESPECIALIDAD_PRACTICAS]);
                        bValue = normalizeStringForComparison(b[FIELD_ESPECIALIDAD_PRACTICAS]);
                        break;
                    case 'horas':
                        aValue = a[FIELD_HORAS_PRACTICAS] || 0;
                        bValue = b[FIELD_HORAS_PRACTICAS] || 0;
                        break;
                    case 'fechaInicio':
                        aValue = safeGetTime(a[FIELD_FECHA_INICIO_PRACTICAS]);
                        bValue = safeGetTime(b[FIELD_FECHA_FIN_PRACTICAS]);
                        break;
                    case 'estado':
                        aValue = normalizeStringForComparison(a[FIELD_ESTADO_PRACTICA]);
                        bValue = normalizeStringForComparison(b[FIELD_ESTADO_PRACTICA]);
                        break;
                    default:
                        return 0;
                }
                if (aValue < bValue) return sortConfig.direction === 'ascending' ? -1 : 1;
                if (aValue > bValue) return sortConfig.direction === 'ascending' ? 1 : -1;
                return 0;
            });
        }
        return processableItems;
    }, [practicas, sortConfig]);
    const requestSort = (key) => {
        let direction = 'ascending';
        if (sortConfig.key === key && sortConfig.direction === 'ascending') {
            direction = 'descending';
        }
        setSortConfig({ key, direction });
    };
  if (practicas.length === 0) {
    return (
       <div className="bg-white rounded-xl shadow-lg shadow-slate-200/50 p-6">
        <h2 className="text-slate-800 text-xl font-semibold leading-tight tracking-tight mb-2 flex items-center gap-3">
            <span className="material-icons text-sky-500 !text-2xl">work_history</span>
            <span>Detalle de Prácticas</span>
        </h2>
        <p className="text-slate-500 mt-3 text-center py-4">No tienes prácticas registradas.</p>
      </div>
    );
  }
  return (
    <div className="bg-white rounded-xl shadow-lg shadow-slate-200/50 p-6">
      <div className="mb-5">
          <h2 className="text-slate-800 text-xl font-semibold leading-tight tracking-tight flex items-center gap-3">
            <span className="material-icons text-sky-500 !text-2xl">work_history</span>
            <span>Detalle de Prácticas</span>
          </h2>
      </div>
      <div className="border rounded-lg overflow-x-auto border-slate-200/70">
        <table className="w-full min-w-[700px]">
          <thead className="bg-slate-100/70 border-b-2 border-slate-200">
            <tr>
              <SortableHeader label="Institución" sortKey="institucion" sortConfig={sortConfig} requestSort={requestSort} className="text-left w-2/6" />
              <SortableHeader label="Especialidad" sortKey="especialidad" sortConfig={sortConfig} requestSort={requestSort} />
              <SortableHeader label="Horas" sortKey="horas" sortConfig={sortConfig} requestSort={requestSort} />
              <SortableHeader label="Periodo" sortKey="fechaInicio" sortConfig={sortConfig} requestSort={requestSort} />
              <SortableHeader label="Estado" sortKey="estado" sortConfig={sortConfig} requestSort={requestSort} />
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-200/60">
            {sortedPracticas.map((practica) => {
              const institucionRaw = practica[FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS];
              const institucion = Array.isArray(institucionRaw) ? institucionRaw.join(', ') : institucionRaw;
              const statusRaw = practica[FIELD_ESTADO_PRACTICA];
              const status = Array.isArray(statusRaw) ? statusRaw?.[0] : statusRaw;
              const statusVisuals = getStatusVisuals(status);
              return (
              <tr key={practica.id} className="transition-colors duration-200 odd:bg-white even:bg-slate-50/50 hover:!bg-slate-100">
                <td className="p-4 align-middle text-sm text-slate-800 font-medium break-words">{institucion || 'N/A'}</td>
                <td className="p-4 align-middle text-center">
                    <span className={getEspecialidadClasses(practica[FIELD_ESPECIALIDAD_PRACTICAS])}>{practica[FIELD_ESPECIALIDAD_PRACTICAS] || 'N/A'}</span>
                </td>
                <td className="p-4 text-sm text-center align-middle text-slate-700 font-semibold">{practica[FIELD_HORAS_PRACTICAS] || 0}</td>
                <td className="p-4 text-sm text-center align-middle text-slate-700">{formatDate(practica[FIELD_FECHA_INICIO_PRACTICAS])} - {formatDate(practica[FIELD_FECHA_FIN_PRACTICAS])}</td>
                <td className="p-4 align-middle text-center">
                   <span className={`${statusVisuals.labelClass} gap-1.5`}>
                        <span className="material-icons !text-sm">{statusVisuals.icon}</span>
                        <span>{status || 'N/A'}</span>
                   </span>
                </td>
              </tr>
            )})}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const AuthInput = ({ id, type, value, onChange, placeholder, icon, disabled = false, ...props }) => (

      <span className="material-icons text-slate-400">{icon}</span>
    </div>
    <input id={id} name={id} type={type} value={value} onChange={onChange} disabled={disabled} className="w-full rounded-lg border border-slate-300 p-3 pl-11 text-base text-slate-800 bg-white shadow-sm placeholder-slate-400/80 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition-all disabled:bg-slate-100" placeholder={placeholder} required {...props} />
  </div>
);

const Auth = ({ onLoginSuccess, showModal }) => {
  const [mode, setMode] = useState('login');
  const [legajo, setLegajo] = useState('');
  const [password, setPassword] = useState('');
  const [confirmPassword, setConfirmPassword] = useState('');
  const [showPassword, setShowPassword] = useState(false);
  const [isLoading, setIsLoading] = useState(false);
  const [error, setError] = useState(null);
  const [legajoCheckLoading, setLegajoCheckLoading] = useState(false);
  const [registerStudentName, setRegisterStudentName] = useState(null);
  const [legajoError, setLegajoError] = useState(null);

  const verifyLegajo = useCallback(async (legajoToVerify) => {
    if (!legajoToVerify || mode !== 'register') return;
    setLegajoCheckLoading(true);
    setRegisterStudentName(null);
    setLegajoError(null);
    let studentName = null;
    try {
        const { records: studentRecords, error: studentError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_ESTUDIANTES, [FIELD_NOMBRE_ESTUDIANTES], `{${FIELD_LEGAJO_ESTUDIANTES}} = '${legajoToVerify}'`, 1);
        if (studentError) console.warn("Could not query 'Estudiantes' table:", studentError.error);
        if (studentRecords.length > 0 && studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES]) {
            studentName = studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES];
        } else {
            const { records: ppsRecords, error: ppsError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_PPS, [FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS], `{${FIELD_LEGAJO_PPS}} = '${legajoToVerify}'`, 1);
            if (ppsError) console.warn("Could not query 'PPS' table:", ppsError.error);
            if (ppsRecords.length > 0) {
                const nameField = ppsRecords[0].fields[FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS];
                if (Array.isArray(nameField) && nameField.length > 0) studentName = nameField[0];
                else if (typeof nameField === 'string') studentName = nameField;
            }
        }
        if (studentName) {
            setRegisterStudentName(studentName);
        } else {
            setLegajoError('No se encontró un estudiante con este legajo. Verifica el número.');
            setLegajoCheckLoading(false);
            return;
        }
    } catch (e) {
        setLegajoError('Ocurrió un error al buscar tu nombre. Inténtalo de nuevo.');
        setLegajoCheckLoading(false);
        return;
    }
    try {
        const { records: existingUser, error: existingUserError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_AUTH_USERS, [FIELD_LEGAJO_AUTH], `{${FIELD_LEGAJO_AUTH}} = '${legajoToVerify}'`, 1);
        if (existingUserError) {
            console.warn( "Advertencia: No se pudo verificar si el usuario ya existe.", existingUserError);
        } else if (existingUser.length > 0) {
            setLegajoError('Ya existe una cuenta para este legajo. Por favor, inicia sesión.');
        }
    } catch (e) {
        console.warn("Advertencia: Ocurrió un error crítico al verificar si el usuario ya existe.", e);
    } finally {
        setLegajoCheckLoading(false);
    }
  }, [mode]);

  useEffect(() => {
    if (mode !== 'register') {
        setLegajoError(null);
        setRegisterStudentName(null);
        return;
    }
    const handler = setTimeout(() => {
      const legajoToVerify = legajo.trim();
      if (legajoToVerify) {
        verifyLegajo(legajoToVerify);
      } else {
        setLegajoError(null);
        setRegisterStudentName(null);
      }
    }, 500);
    return () => clearTimeout(handler);
  }, [legajo, mode, verifyLegajo]);

  const handleSubmit = async (e) => {
    e.preventDefault();
    const legajoTrimmed = legajo.trim();
    const passwordTrimmed = password.trim();
    if (legajoTrimmed === 'admin' && passwordTrimmed === 'superadmin') {
      onLoginSuccess({ legajo: 'admin', nombre: 'Super Usuario', isSuperUser: true });
      return;
    }
    if (!legajoTrimmed || !passwordTrimmed) {
        setError('Por favor, completa todos los campos. El legajo y la contraseña son obligatorios.');
        return;
    }
    setIsLoading(true);
    setError(null);
    if (mode === 'register' && legajoError) {
        setError(legajoError);
        setIsLoading(false);
        return;
    }
    try {
        if (mode === 'login') {
            const { records, error: fetchError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_AUTH_USERS, [FIELD_PASSWORD_HASH_AUTH, FIELD_SALT_AUTH, FIELD_NOMBRE_AUTH], `{${FIELD_LEGAJO_AUTH}} = '${legajoTrimmed}'`, 1);
            if (fetchError) throw new Error('Error al conectar con el servidor.');
            if (records.length === 0) {
                setError('Legajo o contraseña incorrectos.');
                setIsLoading(false);
                return;
            }
            const user = records[0].fields;
            const isValid = await verifyPassword(passwordTrimmed, user[FIELD_SALT_AUTH], user[FIELD_PASSWORD_HASH_AUTH]);
            if (isValid) {
                onLoginSuccess({ legajo: legajoTrimmed, nombre: user[FIELD_NOMBRE_AUTH] });
            } else {
                setError('Legajo o contraseña incorrectos.');
            }
        } else { 
            if (passwordTrimmed !== confirmPassword.trim()) {
                setError('Las contraseñas no coinciden.');
                setIsLoading(false);
                return;
            }
            if (!registerStudentName) {
                setError('Verifica tu legajo antes de registrarte.');
                setIsLoading(false);
                return;
            }
            const salt = generateSalt();
            const passwordHash = await hashPassword(passwordTrimmed, salt);
            const { record, error: createError } = await createAirtableRecord(AIRTABLE_TABLE_NAME_AUTH_USERS, {
                [FIELD_LEGAJO_AUTH]: legajoTrimmed,
                [FIELD_NOMBRE_AUTH]: registerStudentName,
                [FIELD_PASSWORD_HASH_AUTH]: passwordHash,
                [FIELD_SALT_AUTH]: salt
            });
            if (createError || !record) {
                console.error("Airtable Create Error:", createError)
                throw new Error(typeof createError?.error === 'string' ? createError.error : createError?.error.message || 'No se pudo crear la cuenta.');
            }
            onLoginSuccess({ legajo: legajoTrimmed, nombre: registerStudentName });
            showModal('¡Éxito!', 'Tu cuenta ha sido creada y has iniciado sesión automáticamente.');
        }
    } catch (err) {
        setError(err.message || 'Ocurrió un error inesperado.');
    } finally {
        setIsLoading(false);
    }
  };

  const handleModeChange = (newMode) => {
    setMode(newMode);
    setError(null);
    setLegajoError(null);
    setRegisterStudentName(null);
    setPassword('');
    setConfirmPassword('');
  }

  return (
    <div className="min-h-screen w-full bg-slate-50 md:grid md:grid-cols-5 xl:grid-cols-2">
      <div className="hidden md:flex md:col-span-2 xl:col-span-1 bg-gradient-to-br from-slate-900 to-slate-800 p-8 lg:p-12 flex-col justify-between text-white shadow-2xl animate-gradient-move">
        <div className="flex-shrink-0 animate-fade-in-up" style={{ animationDelay: '0ms' }}><MiPanelLogo className="h-16 w-auto" variant="dark" /></div>
        <div className="flex-grow flex flex-col justify-center">
          <h1 className="text-4xl lg:text-5xl font-extrabold tracking-tight leading-tight animate-fade-in-up" style={{ animationDelay: '100ms' }}>Bienvenido a <br/> Mi Panel Académico</h1>
          <p className="mt-4 text-slate-300 text-lg lg:text-xl max-w-sm animate-fade-in-up" style={{ animationDelay: '200ms' }}>Tu portal centralizado para el seguimiento de Prácticas Profesionales Supervisadas.</p>
        </div>
        <div className="flex-shrink-0 animate-fade-in-up" style={{ animationDelay: '300ms' }}><UfloLogo className="h-16 w-auto" variant="dark" /></div>
      </div>
      <div className="md:col-span-3 xl:col-span-1 flex flex-col items-center justify-center p-4 min-h-screen">
          <main className="w-full max-w-md">
            <div className="flex md:hidden justify-center items-center gap-4 mb-6">
                <UfloLogo className="h-12 w-auto" />
                <MiPanelLogo className="h-12 w-auto" />
            </div>
            <div className="bg-white rounded-xl shadow-xl border border-slate-200/80 p-6 sm:p-10">
                <div className="text-center mb-6">
                    <h2 className="text-2xl sm:text-3xl font-bold text-slate-800 animate-fade-in-up" style={{ animationDelay: '400ms' }}>Acceso de Estudiantes</h2>
                    <p className="text-slate-500 mt-1 animate-fade-in-up" style={{ animationDelay: '500ms' }}>Accede a tu cuenta o regístrate.</p>
                </div>
                <div className="p-1 bg-slate-100 rounded-lg flex items-center mb-6 ring-1 ring-slate-200/50 animate-fade-in-up" style={{ animationDelay: '600ms' }}>
                    <button onClick={() => handleModeChange('login')} className={`w-full py-2.5 text-sm font-semibold rounded-md transition-all duration-300 ${mode === 'login' ? 'bg-white text-sky-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Iniciar Sesión</button>
                    <button onClick={() => handleModeChange('register')} className={`w-full py-2.5 text-sm font-semibold rounded-md transition-all duration-300 ${mode === 'register' ? 'bg-white text-sky-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Crear Usuario</button>
                </div>
                <form onSubmit={handleSubmit} className="space-y-4">
                    <div className="relative animate-fade-in-up" style={{ animationDelay: '700ms' }}><AuthInput id="legajo" type="text" value={legajo} onChange={(e) => setLegajo(e.target.value)} placeholder="Número de Legajo" icon="badge" disabled={isLoading} autoComplete="username"/></div>
                    {mode === 'register' && (
                        <div className="h-10 px-3 flex items-center">
                            {legajoCheckLoading ? (<div className="flex items-center gap-2 text-slate-500 text-sm"><div className="border-2 border-slate-200 border-t-sky-500 rounded-full w-4 h-4 animate-spin"></div><span>Verificando legajo...</span></div>
                            ) : legajoError ? (<p className="text-red-600 text-sm flex items-center gap-1.5"><span className="material-icons !text-base">error_outline</span>{legajoError}</p>
                            ) : registerStudentName ? (<p className="text-teal-700 text-sm font-medium flex items-center gap-1.5"><span className="material-icons !text-base">check_circle</span>Estudiante: {registerStudentName}</p>
                            ): <p className="text-slate-500 text-xs">Ingresa tu legajo para verificar tu identidad.</p>}
                        </div>
                    )}
                    <div className="relative animate-fade-in-up" style={{ animationDelay: '800ms' }}>
                      <AuthInput id="password" type={showPassword ? 'text' : 'password'} value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Contraseña" icon="lock" disabled={isLoading} autoComplete={mode === 'login' ? 'current-password' : 'new-password'}/>
                       <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 flex items-center px-3 text-slate-500 hover:text-slate-700" aria-label={showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'}><span className="material-icons !text-xl">{showPassword ? 'visibility_off' : 'visibility'}</span></button>
                    </div>
                    {mode === 'register' && (
                        <div className="relative">
                          <AuthInput id="confirmPassword" type={showPassword ? 'text' : 'password'} value={confirmPassword} onChange={(e) => setConfirmPassword(e.target.value)} placeholder="Confirmar Contraseña" icon="lock_person" disabled={isLoading} autoComplete="new-password"/>
                           <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute inset-y-0 right-0 flex items-center px-3 text-slate-500 hover:text-slate-700" aria-label={showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'}><span className="material-icons !text-xl">{showPassword ? 'visibility_off' : 'visibility'}</span></button>
                        </div>
                    )}
                    {error && <p className="text-red-600 text-sm text-center pt-2">{error}</p>}
                    <div className="pt-4 animate-fade-in-up" style={{ animationDelay: '1000ms' }}>
                        <button type="submit" disabled={isLoading || (mode === 'register' && (!registerStudentName || !!legajoError))} className="w-full bg-sky-600 text-white font-bold text-base py-3 px-6 rounded-lg transition-all duration-200 ease-in-out shadow-md hover:bg-sky-700 active:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 disabled:bg-slate-400 disabled:cursor-not-allowed flex items-center justify-center gap-3">
                            {isLoading && <div className="border-2 border-white/50 border-t-white rounded-full w-5 h-5 animate-spin"></div>}
                            <span>{mode === 'login' ? 'Ingresar' : 'Crear Cuenta'}</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
      </div>
    </div>
  );
};

const AdminSearch = ({ onSearch, isLoading }) => {
  const [legajo, setLegajo] = useState('');
  const handleSearch = (e) => {
    e.preventDefault();
    if (legajo.trim()) {
      onSearch(legajo.trim());
    }
  };
  return (
    <div className="bg-white rounded-xl shadow-lg shadow-slate-200/50 p-6 sm:p-8 mb-8 border border-slate-200/60">
      <h2 className="text-slate-900 text-2xl font-bold tracking-tight">Buscar Estudiante</h2>
      <p className="text-slate-600 text-base mt-1 mb-6">Ingrese el número de legajo del estudiante que desea consultar.</p>
      <form onSubmit={handleSearch} className="flex flex-col sm:flex-row gap-3">
        <div className="relative flex-grow">
          <div className="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5"><span className="material-icons text-slate-400">person_search</span></div>
          <input type="text" value={legajo} onChange={(e) => setLegajo(e.target.value)} disabled={isLoading} className="w-full rounded-lg border border-slate-300 p-3 pl-11 text-base text-slate-800 bg-white shadow-sm placeholder-slate-400/80 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 outline-none transition-all disabled:bg-slate-100 disabled:text-slate-500 disabled:cursor-not-allowed" placeholder="Número de legajo del estudiante" aria-label="Número de Legajo del Estudiante" />
        </div>
        <button type="submit" disabled={isLoading || !legajo.trim()} className="bg-sky-600 text-white font-bold text-base py-3 px-8 rounded-lg transition-all duration-200 ease-in-out shadow-md hover:bg-sky-700 active:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 disabled:bg-slate-400 disabled:text-slate-100 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2">
          {isLoading ? (<><div className="border-2 border-white/50 border-t-white rounded-full w-5 h-5 animate-spin"></div><span>Buscando...</span></>) : ('Buscar')}
        </button>
      </form>
    </div>
  );
};


// --- START OF App.tsx ---
const App = () => {
  const [authenticatedUser, setAuthenticatedUser] = useState(null);
  const [viewedStudent, setViewedStudent] = useState(null);
  const [practicas, setPracticas] = useState([]);
  const [solicitudes, setSolicitudes] = useState([]);
  const [isLoading, setIsLoading] = useState(true);
  const [modalInfo, setModalInfo] = useState(null);
  const [selectedOrientacion, setSelectedOrientacion] = useState("");
  const [studentAirtableId, setStudentAirtableId] = useState(null);
  const [showSaveConfirmation, setShowSaveConfirmation] = useState(false);
  const [criterios, setCriterios] = useState({
    horasTotales: 0,
    horasFaltantes250: HORAS_OBJETIVO_TOTAL,
    cumpleHorasTotales: false,
    horasOrientacionElegida: 0,
    horasFaltantesOrientacion: HORAS_OBJETIVO_ORIENTACION,
    cumpleHorasOrientacion: false,
    orientacionesCursadasCount: 0,
    orientacionesUnicas: [],
    cumpleRotacion: false,
  });

  const isSuperUserMode = authenticatedUser?.isSuperUser === true;

  useEffect(() => {
    if (!window.AIRTABLE_PAT_WARNING_SHOWN) {
        console.warn("ADVERTENCIA DE SEGURIDAD: El token PAT de Airtable está expuesto en este código. Para producción, la lógica que usa este token debería ejecutarse en un backend seguro.");
        window.AIRTABLE_PAT_WARNING_SHOWN = true;
    }
    const storedUser = sessionStorage.getItem('authenticatedUser');
    if (storedUser) {
        const user = JSON.parse(storedUser);
        setAuthenticatedUser(user);
    } else {
        setIsLoading(false);
    }
  }, []);

  const handleShowModal = (title, message) => setModalInfo({ title, message });

  const calculateCriterios = useCallback(() => {
    let totalHoras = 0;
    const matchedNormalizedOrientacionesEnumSet = new Set();
    practicas.forEach(p => {
      totalHoras += p[FIELD_HORAS_PRACTICAS] || 0;
      const especialidadPractica = p[FIELD_ESPECIALIDAD_PRACTICAS];
      if (especialidadPractica) {
        const normalizedEspecialidadFromPractice = normalizeStringForComparison(especialidadPractica); 
        for (const orientacionEnumValue of ALL_ORIENTACIONES) {
          if (normalizeStringForComparison(orientacionEnumValue) === normalizedEspecialidadFromPractice) {
            matchedNormalizedOrientacionesEnumSet.add(normalizeStringForComparison(orientacionEnumValue)); 
            break;
          }
        }
      }
    });
    let horasEnOrientacion = 0;
    if (selectedOrientacion) {
      const normalizedSelectedActualOrientacion = normalizeStringForComparison(selectedOrientacion); 
      practicas.forEach(p => {
        const especialidadPractica = p[FIELD_ESPECIALIDAD_PRACTICAS];
        if (especialidadPractica) {
            const normalizedEspecialidadFromPractice = normalizeStringForComparison(especialidadPractica);
            if (normalizedEspecialidadFromPractice === normalizedSelectedActualOrientacion) {
              horasEnOrientacion += p[FIELD_HORAS_PRACTICAS] || 0;
            }
        }
      });
    }
    const horasFaltantesOrientacion = Math.max(0, HORAS_OBJETIVO_ORIENTACION - horasEnOrientacion);
    const newCriterios = {
      horasTotales: totalHoras,
      horasFaltantes250: Math.max(0, HORAS_OBJETIVO_TOTAL - totalHoras),
      cumpleHorasTotales: totalHoras >= HORAS_OBJETIVO_TOTAL,
      horasOrientacionElegida: horasEnOrientacion,
      horasFaltantesOrientacion: horasFaltantesOrientacion,
      cumpleHorasOrientacion: selectedOrientacion ? horasEnOrientacion >= HORAS_OBJETIVO_ORIENTACION : false,
      orientacionesCursadasCount: matchedNormalizedOrientacionesEnumSet.size,
      orientacionesUnicas: Array.from(matchedNormalizedOrientacionesEnumSet).map(normalizedEnum => {
        const originalEnumValue = ALL_ORIENTACIONES.find(o => normalizeStringForComparison(o) === normalizedEnum);
        return originalEnumValue || (normalizedEnum.charAt(0).toUpperCase() + normalizedEnum.slice(1));
      }),
      cumpleRotacion: matchedNormalizedOrientacionesEnumSet.size >= ROTACION_OBJETIVO_ORIENTACIONES,
    };
    setCriterios(newCriterios);
  }, [practicas, selectedOrientacion]);

  useEffect(() => {
    calculateCriterios();
  }, [practicas, selectedOrientacion, calculateCriterios]);

  const resetStateForDataFetch = () => {
    setPracticas([]);
    setSolicitudes([]);
    setSelectedOrientacion("");
    setViewedStudent(null);
    setStudentAirtableId(null);
    setCriterios({
      horasTotales: 0,
      horasFaltantes250: HORAS_OBJETIVO_TOTAL,
      cumpleHorasTotales: false,
      horasOrientacionElegida: 0,
      horasFaltantesOrientacion: HORAS_OBJETIVO_ORIENTACION,
      cumpleHorasOrientacion: false,
      orientacionesCursadasCount: 0,
      orientacionesUnicas: [],
      cumpleRotacion: false,
    });
  };
  
  const fetchDataForUser = useCallback(async (legajo, studentName) => {
    setIsLoading(true);
    setPracticas([]);
    setSolicitudes([]);
    let foundAnyData = false;
    try {
        const { records: practicasRecords, error: practicasError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_PRACTICAS, [FIELD_NOMBRE_INSTITUCION_LOOKUP_PRACTICAS, FIELD_HORAS_PRACTICAS, FIELD_FECHA_INICIO_PRACTICAS, FIELD_FECHA_FIN_PRACTICAS, FIELD_ESTADO_PRACTICA, FIELD_ESPECIALIDAD_PRACTICAS], `{${FIELD_NOMBRE_BUSQUEDA_PRACTICAS}} = '${studentName}'`);
        if (practicasError) handleShowModal('Error de Carga', `Error al cargar prácticas: ${typeof practicasError.error === 'string' ? practicasError.error : practicasError.error.message}`);
        else if (practicasRecords.length > 0) {
          setPracticas(practicasRecords.map(r => ({ ...r.fields, id: r.id })));
          foundAnyData = true;
        }
      const { records: solicitudesRecords, error: solicitudesError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_PPS, [FIELD_EMPRESA_PPS_SOLICITUD, FIELD_ESTADO_PPS, FIELD_NOTAS_PPS, FIELD_ULTIMA_ACTUALIZACION_PPS], `{${FIELD_LEGAJO_PPS}} = '${legajo.trim()}'`);
      if (solicitudesError) handleShowModal('Error de Carga', `Error al cargar solicitudes: ${typeof solicitudesError.error === 'string' ? solicitudesError.error : solicitudesError.error.message}`);
      else if (solicitudesRecords.length > 0) {
        setSolicitudes(solicitudesRecords.map(r => ({ ...r.fields, id: r.id })));
        foundAnyData = true;
      }
      if (!foundAnyData && !isSuperUserMode) {
        handleShowModal('Sin Resultados', `No se encontró información de prácticas o solicitudes para ${studentName}. Puedes empezar a cargar tus datos en el sistema de la universidad.`);
      }
    } catch (error) {
      console.error('Error en el proceso de búsqueda general:', error);
      handleShowModal('Error Crítico', `Ocurrió un error inesperado: ${error.message || 'Por favor, intenta de nuevo más tarde.'}`);
    } finally {
      setIsLoading(false);
    }
  }, [isSuperUserMode]);

  const handleAdminSearch = async (legajo) => {
      setIsLoading(true);
      resetStateForDataFetch();
      let studentName = null;
      try {
          const { records: studentRecords, error: studentError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_ESTUDIANTES, [FIELD_NOMBRE_ESTUDIANTES, FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES], `{${FIELD_LEGAJO_ESTUDIANTES}} = '${legajo}'`, 1);
          if (studentError) throw new Error(`Error al buscar en 'Estudiantes': ${typeof studentError.error === 'string' ? studentError.error : studentError.error.message}`);
          if (studentRecords.length > 0 && studentRecords[0].fields[FIELD_NOMBRE_ESTUDIANTES]) {
              const studentRecord = studentRecords[0];
              studentName = studentRecord.fields[FIELD_NOMBRE_ESTUDIANTES];
              setStudentAirtableId(studentRecord.id);
              const savedOrientacion = studentRecord.fields[FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES];
              if (savedOrientacion) setSelectedOrientacion(savedOrientacion);
          } else {
              const { records: ppsRecords, error: ppsError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_PPS, [FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS], `{${FIELD_LEGAJO_PPS}} = '${legajo}'`, 1);
              if (ppsError) throw new Error(`Error al buscar en 'Solicitud de PPS': ${typeof ppsError.error === 'string' ? ppsError.error : ppsError.error.message}`);
              if (ppsRecords.length > 0) {
                  const nameField = ppsRecords[0].fields[FIELD_NOMBRE_ESTUDIANTE_LOOKUP_PPS];
                  if (Array.isArray(nameField) && nameField.length > 0) studentName = nameField[0];
                  else if (typeof nameField === 'string') studentName = nameField;
              }
          }
          if (studentName) {
              setViewedStudent({ legajo, nombre: studentName });
              await fetchDataForUser(legajo, studentName);
          } else {
              handleShowModal('Sin Resultados', `No se encontró un estudiante con el legajo ${legajo}.`);
              setIsLoading(false);
          }
      } catch (e) {
          console.error('[AdminSearch] Error:', e);
          handleShowModal('Error de Búsqueda', e.message || 'Ocurrió un error al buscar al estudiante.');
          setIsLoading(false);
      }
  };

  useEffect(() => {
    if (authenticatedUser && !isSuperUserMode) {
        const initializeUserData = async () => {
            setIsLoading(true);
            resetStateForDataFetch();
            const { records: studentRecords, error: studentError } = await fetchAirtableData(AIRTABLE_TABLE_NAME_ESTUDIANTES, [FIELD_NOMBRE_ESTUDIANTES, FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES], `{${FIELD_LEGAJO_ESTUDIANTES}} = '${authenticatedUser.legajo}'`, 1);
            if (studentError) console.error("Could not fetch student record for pre-filling orientation", studentError);
            if (studentRecords && studentRecords.length > 0) {
                const studentRecord = studentRecords[0];
                setStudentAirtableId(studentRecord.id);
                const savedOrientacion = studentRecord.fields[FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES];
                if (savedOrientacion) setSelectedOrientacion(savedOrientacion);
            }
            await fetchDataForUser(authenticatedUser.legajo, authenticatedUser.nombre);
        };
        initializeUserData();
    } else if (!authenticatedUser) {
        setIsLoading(false);
    }
  }, [authenticatedUser, isSuperUserMode, fetchDataForUser]);

  const handleOrientacionChange = async (orientacion) => {
    setSelectedOrientacion(orientacion);
    setShowSaveConfirmation(true);
    setTimeout(() => setShowSaveConfirmation(false), 2000); // Hide after 2 seconds

    if (studentAirtableId) {
        const { error } = await updateAirtableRecord(
            AIRTABLE_TABLE_NAME_ESTUDIANTES,
            studentAirtableId,
            { [FIELD_ORIENTACION_ELEGIDA_ESTUDIANTES]: orientacion || null }
        );

        if (error) {
            console.error("Failed to update chosen orientation in Airtable:", error);
            handleShowModal('Error de Sincronización', 'No se pudo guardar la orientación elegida. La selección funcionará localmente pero no se guardará para futuras sesiones.');
        }
    }
  };


  const handleLoginSuccess = (user) => {
    setAuthenticatedUser(user);
    sessionStorage.setItem('authenticatedUser', JSON.stringify(user));
    if(user.isSuperUser){
      setIsLoading(false);
    }
  };
  
  const handleLogout = () => {
    setAuthenticatedUser(null);
    sessionStorage.removeItem('authenticatedUser');
    resetStateForDataFetch();
  };

  const showData = (!isLoading && authenticatedUser && !isSuperUserMode) || (isSuperUserMode && viewedStudent && !isLoading);
  const studentNameToDisplay = isSuperUserMode ? (viewedStudent?.nombre || '') : (authenticatedUser?.nombre || '');
  
  if (!authenticatedUser) {
    return (
      <>
        {isLoading ? (
            <div className="w-full min-h-screen flex flex-col items-center justify-center p-4">
                <Loader />
            </div>
        ) : (
            <Auth onLoginSuccess={handleLoginSuccess} showModal={handleShowModal} />
        )}
        <Modal
          isOpen={!!modalInfo}
          title={modalInfo?.title || ''}
          message={modalInfo?.message || ''}
          onClose={() => setModalInfo(null)}
        />
      </>
    );
  }

  return (
    <div className="min-h-screen">
      <div className="hidden lg:flex lg:flex-col lg:w-72 lg:fixed lg:inset-y-0 lg:z-50 bg-gradient-to-br from-slate-900 to-slate-800 shadow-2xl p-8 text-white">
        <div className="flex-shrink-0">
           <MiPanelLogo className="h-16 w-auto" variant="dark" />
        </div>
        <div className="flex-grow flex flex-col justify-center gap-4">
            <p className="text-slate-400 text-sm font-semibold uppercase tracking-wider">
              {isSuperUserMode ? 'Modo Administrador' : 'Estudiante'}
            </p>
            <div className="space-y-1">
              <h2 className="text-2xl font-bold text-white">
                {authenticatedUser.nombre}
              </h2>
              {!isSuperUserMode && (
                 <p className="text-slate-300 font-medium">Legajo: {authenticatedUser.legajo}</p>
              )}
            </div>
             {isSuperUserMode && viewedStudent && (
                 <div className="mt-4 p-4 bg-slate-700/50 rounded-lg border border-slate-600/80">
                     <p className="text-slate-400 text-xs font-semibold uppercase tracking-wider">Viendo a</p>
                     <p className="text-lg font-bold text-white mt-1">{viewedStudent.nombre}</p>
                     <p className="text-slate-300 font-medium text-sm">Legajo: {viewedStudent.legajo}</p>
                 </div>
             )}
        </div>
        <div className="flex-shrink-0 space-y-6">
            <button
              onClick={handleLogout}
              className="w-full bg-slate-700/80 hover:bg-slate-700 text-slate-200 hover:text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 text-base shadow-sm border border-slate-600/80 flex items-center justify-center gap-3"
              aria-label="Cerrar sesión"
            >
              <span className="material-icons !text-xl">logout</span>
              <span>Cerrar Sesión</span>
            </button>
            <UfloLogo className="h-16 w-auto mx-auto" variant="dark" />
        </div>
      </div>

      <div className="lg:pl-72">
        <div className="w-full max-w-5xl mx-auto p-4 sm:p-6 md:p-8">
            <AppHeader isLoggedIn={!!authenticatedUser} onLogout={handleLogout} isSuperUserMode={isSuperUserMode} />
            <main className="flex-grow">
              {isSuperUserMode ? (
                <>
                  <AdminSearch onSearch={handleAdminSearch} isLoading={isLoading} />
                  {isLoading && <div className="mt-8"><Loader /></div>}
                  {showData && (
                    <div className="space-y-8 mt-8">
                      <CriteriosPanel 
                        criterios={criterios} 
                        selectedOrientacion={selectedOrientacion}
                        onOrientacionChange={handleOrientacionChange}
                        studentName={studentNameToDisplay}
                        isSuperUserMode={true}
                        showSaveConfirmation={showSaveConfirmation}
                      />
                      <SolicitudesList solicitudes={solicitudes} />
                      <PracticasTable practicas={practicas} selectedOrientacion={selectedOrientacion} />
                      <Footer />
                    </div>
                  )}
                </>
              ) : (
                <>
                  {isLoading ? <Loader /> : (
                     showData && (
                      <div className="space-y-8">
                          <CriteriosPanel 
                              criterios={criterios} 
                              selectedOrientacion={selectedOrientacion}
                              onOrientacionChange={handleOrientacionChange}
                              studentName={studentNameToDisplay}
                              showSaveConfirmation={showSaveConfirmation}
                          />
                          <SolicitudesList solicitudes={solicitudes} />
                          <PracticasTable practicas={practicas} selectedOrientacion={selectedOrientacion} />
                          <Footer />
                      </div>
                    )
                  )}
                </>
              )}
            </main>
        </div>
      </div>
      
      <Modal
        isOpen={!!modalInfo}
        title={modalInfo?.title || ''}
        message={modalInfo?.message || ''}
        onClose={() => setModalInfo(null)}
      />
    </div>
  );
};


// --- START OF index.tsx ---
const rootElement = document.getElementById('root');
if (!rootElement) {
  throw new Error("Could not find root element to mount to");
}

const root = ReactDOM.createRoot(rootElement);
root.render(
  <React.StrictMode>
    <App />
  </React.StrictMode>
);

    </script>
</body>
</html>
